<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>智能研发早报 {{DATE}}</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #f1f5f9;
  --bg-card: #ffffff;
  --bg-banner: linear-gradient(135deg, #ffffff 0%, #f0f9ff 50%, #e0f2fe 100%);
  --bg-source-tag: #f1f5f9;
  --text-primary: #1f2937;
  --text-secondary: #4b5563;
  --text-tertiary: #9ca3af;
  --text-banner: #1f2937;
  --text-banner-sub: #3b82f6;
  --text-source-tag: #4b5563;
  --border-card: #e2e8f0;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.1);
  --cat-intl: #3b82f6;
  --cat-intl-bg: #eff6ff;
  --cat-domestic: #10b981;
  --cat-domestic-bg: #f0fdf4;
  --cat-peer: #f59e0b;
  --cat-peer-bg: #fffbeb;
  --cat-other: #8b5cf6;
  --cat-other-bg: #faf5ff;
  --model-tag-bg: #f3e8ff;
  --model-tag-text: #9333ea;
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.25s ease;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1219;
    --bg-card: #1a1f2e;
    --bg-banner: linear-gradient(135deg, #070d1a 0%, #0e1e3d 50%, #091428 100%);
    --bg-source-tag: #252d3d;
    --text-primary: #e2e8f0;
    --text-secondary: #a0aec0;
    --text-tertiary: #718096;
    --text-banner: #ffffff;
    --text-banner-sub: #7da8d4;
    --text-source-tag: #a0aec0;
    --border-card: #2d3748;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.4);
    --cat-intl-bg: rgba(59,130,246,0.1);
    --cat-domestic-bg: rgba(16,185,129,0.1);
    --cat-peer-bg: rgba(245,158,11,0.1);
    --cat-other-bg: rgba(139,92,246,0.1);
    --model-tag-bg: rgba(147,51,234,0.15);
    --model-tag-text: #c084fc;
  }
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* ===== Layout ===== */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 16px;
}
@media (min-width: 768px) { .container { padding: 24px; } }
@media (min-width: 1024px) { .container { padding: 32px 40px; } }

/* ===== Banner ===== */
.banner {
  background: var(--bg-banner);
  border-radius: var(--radius);
  padding: 28px 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.banner::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 60%;
  height: 200%;
  background: radial-gradient(ellipse, rgba(59,130,246,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.banner-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-banner);
  letter-spacing: 0.5px;
  position: relative;
}
.banner-meta {
  margin-top: 8px;
  font-size: 14px;
  color: var(--text-banner-sub);
  position: relative;
}
.banner-stats {
  margin-top: 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  position: relative;
}
.stat-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: #374151;
}
.stat-chip[data-cat="国际"] { background: rgba(59,130,246,0.12); }
.stat-chip[data-cat="国内"] { background: rgba(16,185,129,0.12); }
.stat-chip[data-cat="同业"] { background: rgba(245,158,11,0.12); }
.stat-chip[data-cat="其他"] { background: rgba(139,92,246,0.12); }

@media (prefers-color-scheme: dark) {
  .stat-chip { color: #e2e8f0; }
  .stat-chip[data-cat="国际"] { background: rgba(59,130,246,0.25); }
  .stat-chip[data-cat="国内"] { background: rgba(16,185,129,0.25); }
  .stat-chip[data-cat="同业"] { background: rgba(245,158,11,0.25); }
  .stat-chip[data-cat="其他"] { background: rgba(139,92,246,0.25); }
}
.stat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.stat-dot[data-cat="国际"] { background: #3b82f6; }
.stat-dot[data-cat="国内"] { background: #22c55e; }
.stat-dot[data-cat="同业"] { background: #f59e0b; }
.stat-dot[data-cat="其他"] { background: #a855f7; }

@media (min-width: 768px) {
  .banner { padding: 36px 32px; }
  .banner-title { font-size: 26px; }
  .banner-meta { font-size: 15px; }
}

/* ===== Category Section ===== */
.cat-section {
  margin-bottom: 24px;
}
.cat-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border-card);
}
.cat-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.cat-icon.intl { background: var(--cat-intl-bg); }
.cat-icon.domestic { background: var(--cat-domestic-bg); }
.cat-icon.peer { background: var(--cat-peer-bg); }
.cat-icon.other { background: var(--cat-other-bg); }
.cat-title {
  font-size: 16px;
  font-weight: 700;
}
.cat-title.intl { color: var(--cat-intl); }
.cat-title.domestic { color: var(--cat-domestic); }
.cat-title.peer { color: var(--cat-peer); }
.cat-title.other { color: var(--cat-other); }
.cat-count {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-tertiary);
  margin-left: auto;
}

/* ===== Card List ===== */
.card-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ===== Article Card ===== */
.article-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  transition: box-shadow var(--transition), transform var(--transition);
  border: 1px solid var(--border-card);
  -webkit-tap-highlight-color: transparent;
}
.article-card:hover {
  box-shadow: var(--shadow-card-hover);
  transform: translateY(-1px);
}

.card-main {
  display: flex;
  padding: 16px 18px;
  gap: 14px;
  align-items: flex-start;
}
.card-stripe {
  width: 4px;
  min-height: 40px;
  border-radius: 2px;
  flex-shrink: 0;
  align-self: stretch;
}
.card-stripe.intl { background: var(--cat-intl); }
.card-stripe.domestic { background: var(--cat-domestic); }
.card-stripe.peer { background: var(--cat-peer); }
.card-stripe.other { background: var(--cat-other); }

.card-body { flex: 1; min-width: 0; }
.card-title-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.5;
  word-break: break-word;
}
.model-tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  background: var(--model-tag-bg);
  color: var(--model-tag-text);
  white-space: nowrap;
  flex-shrink: 0;
}

.card-digest {
  margin-top: 10px;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-date {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-time {
  font-weight: 500;
  color: var(--text-secondary);
  font-size: 12px;
}

.card-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.source-tag {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  background: var(--bg-source-tag);
  color: var(--text-source-tag);
  white-space: nowrap;
  text-decoration: none;
  transition: all var(--transition);
  border: none;
  cursor: pointer;
  min-height: 32px;
}
.source-tag a {
  color: inherit;
  text-decoration: none;
}
.source-tags {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.source-tag:hover {
  opacity: 0.85;
  transform: scale(1.02);
}
/* (read-original-btn removed - source tags now link to viewer) */

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 28px 20px;
  color: var(--text-tertiary);
  font-size: 14px;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px dashed var(--border-card);
}

/* ===== Footer ===== */
.page-footer {
  margin-top: 40px;
  padding: 24px 0;
  text-align: center;
  border-top: 1px solid var(--border-card);
}
.footer-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 24px;
  border-radius: 20px;
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 14px;
  text-decoration: none;
  border: 1px solid var(--border-card);
  min-height: 44px;
  transition: all var(--transition);
}
.footer-back:hover {
  color: var(--text-primary);
  border-color: var(--cat-intl);
  text-decoration: none;
}
.footer-info {
  margin-top: 12px;
  font-size: 12px;
  color: var(--text-tertiary);
}

/* ===== Fallback (no-JS) ===== */
#fallback-content .section {
  margin-bottom: 24px;
}
#fallback-content .section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border-card);
}
#fallback-content .section-title {
  font-size: 16px;
  font-weight: 700;
}
#fallback-content #section-intl .section-title { color: var(--cat-intl); }
#fallback-content #section-domestic .section-title { color: var(--cat-domestic); }
#fallback-content #section-peer .section-title { color: var(--cat-peer); }
#fallback-content #section-other .section-title { color: var(--cat-other); }
#fallback-content .card {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-card);
  margin-bottom: 12px;
  padding: 16px 18px;
}
#fallback-content .card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.5;
  word-break: break-word;
}
#fallback-content .source-tag {
  display: inline-block;
  background: var(--bg-source-tag);
  color: var(--text-source-tag);
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  margin-top: 8px;
}
#fallback-content .card-digest {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
  line-height: 1.6;
}
#fallback-content .card-date {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 6px;
  font-weight: 500;
}
#fallback-content .card-time {
  display: inline-block;
  font-weight: 500;
  color: var(--text-secondary);
  font-size: 12px;
}
#fallback-content .empty {
  color: var(--text-tertiary);
  font-style: italic;
  padding: 28px 20px;
  text-align: center;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px dashed var(--border-card);
}

/* source-tag handles click interaction */

/* ===== Animations ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.article-card { animation: fadeIn 0.3s ease forwards; }
.article-card:nth-child(2) { animation-delay: 0.03s; }
.article-card:nth-child(3) { animation-delay: 0.06s; }
.article-card:nth-child(4) { animation-delay: 0.09s; }
.article-card:nth-child(5) { animation-delay: 0.12s; }
.article-card:nth-child(n+6) { animation-delay: 0.15s; }
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.article-card { animation: fadeIn 0.3s ease forwards; }
.article-card:nth-child(2) { animation-delay: 0.03s; }
.article-card:nth-child(3) { animation-delay: 0.06s; }
.article-card:nth-child(4) { animation-delay: 0.09s; }
.article-card:nth-child(5) { animation-delay: 0.12s; }
.article-card:nth-child(n+6) { animation-delay: 0.15s; }
</style>
</head>
<body>

<div class="container">

  <!-- ===== Banner ===== -->
  <div class="banner">
    <div class="banner-title">智能研发早报</div>
    <div class="banner-meta">{{DATE}}</div>
    <div class="banner-stats" id="banner-stats">{{STATS}}</div>
  </div>

  <!-- ===== No-JS Fallback ===== -->
  <div id="fallback-content">
    <div id="section-intl" class="section">{{SECTION_INTL}}{{SECTION_国际}}</div>
    <div id="section-domestic" class="section">{{SECTION_DOMESTIC}}{{SECTION_国内}}</div>
    <div id="section-peer" class="section">{{SECTION_PEER}}{{SECTION_同业}}</div>
    <div id="section-other" class="section">{{SECTION_OTHER}}{{SECTION_其他}}</div>
  </div>

  <!-- ===== JS App ===== -->
  <div id="app" style="display:none">
    <div id="cat-sections"></div>
  </div>

  <!-- ===== Footer ===== -->
  <div class="page-footer">
    <a href="../../index.html" class="footer-back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      返回首页
    </a>
    <div class="footer-info">智能研发早报 · AI-Daily-for-bank</div>
  </div>

</div>

<!-- marked.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
  'use strict';

  var ARTICLES = {{ARTICLES_JSON}};

  /* ===== Category Config ===== */
  var CATS = ['国际', '国内', '同业', '其他'];
  var CAT_CONFIG = {
    '国际': { key: 'intl', color: 'intl', icon: '\uD83C\uDF0D' },
    '国内': { key: 'domestic', color: 'domestic', icon: '\uD83C\uDDE8\uD83C\uDDF3' },
    '同业': { key: 'peer', color: 'peer', icon: '\uD83C\uDFE6' },
    '其他': { key: 'other', color: 'other', icon: '\uD83D\uDCCC' }
  };

  /* ===== Extract date from URL path ===== */
  function extractDateFromPath() {
    var path = window.location.pathname;
    var m = path.match(/\/daily\/([\d]{4}-[\d]{2}-[\d]{2})/);
    return m ? m[1] : '';
  }
  var PAGE_DATE = extractDateFromPath();

  /* ===== Build viewer link ===== */
  function buildViewerLink(sourceFile) {
    if (!sourceFile) return '#';
    var prefix = '../../viewer.html?file=';
    var encodedPath = sourceFile.split('/').map(encodeURIComponent).join('/');
    if (PAGE_DATE) {
      return prefix + 'daily/' + PAGE_DATE + '/' + encodedPath;
    }
    return prefix + encodedPath;
  }

  /* ===== Count by Category ===== */
  var catCounts = {};
  CATS.forEach(function(c) { catCounts[c] = 0; });
  ARTICLES.forEach(function(a) {
    if (catCounts[a.category] !== undefined) catCounts[a.category]++;
  });

  /* ===== Build Stats Chips ===== */
  var statsEl = document.getElementById('banner-stats');
  if (statsEl) {
    var statsHtml = '';
    CATS.forEach(function(cat) {
      statsHtml += '<span class="stat-chip" data-cat="' + cat + '">' +
        '<span class="stat-dot" data-cat="' + cat + '"></span>' +
        cat + ' ' + catCounts[cat] + ' 篇</span>';
    });
    statsEl.innerHTML = statsHtml;
  }

  /* ===== Render Category Sections ===== */
  var sectionsEl = document.getElementById('cat-sections');

  function renderDigest(digest) {
    if (!digest) return '';
    try {
      return marked.parse(digest);
    } catch (e) {
      return escapeHtml(digest);
    }
  }

  function renderCard(article) {
    var cfg = CAT_CONFIG[article.category] || CAT_CONFIG['其他'];
    var digestHtml = renderDigest(article.digest);
    var viewerLink = buildViewerLink(article.source_file);

    var modelTagHtml = '';
    if (article.is_model_related) {
      modelTagHtml = '<span class="model-tag">大模型</span>';
    }

    // 格式化发布时间
    var timeHtml = '';
    if (article.publish_time) {
      var dt = new Date(article.publish_time * 1000);
      var hours = String(dt.getHours()).padStart(2, '0');
      var minutes = String(dt.getMinutes()).padStart(2, '0');
      timeHtml = '<div class="card-date"><span class="card-time">' + hours + ':' + minutes + '</span></div>';
    }

    var sourceTagHtml = '';
    // 多来源标签：每个来源单独可点击，进入对应 viewer 页面
    if (article.source_items && article.source_items.length > 0) {
      article.source_items.forEach(function(si) {
        if (si.source_file) {
          var siLink = buildViewerLink(si.source_file);
          sourceTagHtml += '<a href="' + escapeAttr(siLink) + '" class="source-tag" title="查看 ' + escapeAttr(si.name) + ' 原文">' + escapeHtml(si.name) + '</a>';
        } else {
          sourceTagHtml += '<span class="source-tag">' + escapeHtml(si.name) + '</span>';
        }
      });
    } else if (article.source) {
      if (article.source_file) {
        sourceTagHtml = '<a href="' + escapeAttr(viewerLink) + '" class="source-tag" title="查看原文">' + escapeHtml(article.source) + '</a>';
      } else {
        sourceTagHtml = '<span class="source-tag">' + escapeHtml(article.source) + '</span>';
      }
    }

    return '<div class="article-card">' +
      '<div class="card-main">' +
        '<div class="card-stripe ' + cfg.color + '"></div>' +
        '<div class="card-body">' +
          '<div class="card-title-wrap">' +
            '<div class="card-title">' + escapeHtml(article.title) + '</div>' +
            modelTagHtml +
          '</div>' +
          timeHtml +
          (article.digest ? '<div class="card-digest">' + digestHtml + '</div>' : '') +
          '<div class="card-actions">' +
            sourceTagHtml +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function renderSection(cat) {
    var cfg = CAT_CONFIG[cat];
    var articles = ARTICLES.filter(function(a) { return a.category === cat; });
    var count = articles.length;

    var html = '<div class="cat-section">' +
      '<div class="cat-header">' +
        '<div class="cat-icon ' + cfg.color + '">' + cfg.icon + '</div>' +
        '<div class="cat-title ' + cfg.color + '">' + cat + '</div>' +
        '<div class="cat-count">' + count + ' 篇</div>' +
      '</div>';

    if (count === 0) {
      html += '<div class="empty-state">暂无</div>';
    } else {
      html += '<div class="card-list">';
      articles.forEach(function(a) {
        html += renderCard(a);
      });
      html += '</div>';
    }

    html += '</div>';
    return html;
  }

  var allHtml = '';
  CATS.forEach(function(cat) {
    allHtml += renderSection(cat);
  });
  sectionsEl.innerHTML = allHtml;

  /* ===== Utility ===== */
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function escapeAttr(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /* ===== Init ===== */
  var fallback = document.getElementById('fallback-content');
  if (fallback) fallback.style.display = 'none';
  document.getElementById('app').style.display = 'block';

})();
</script>
</body>
</html>
