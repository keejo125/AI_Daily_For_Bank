// 分类渲染
function renderSection(sectionId, category) {
  var items = ARTICLES.filter(function(a){return a.category===category;});
  var el = document.getElementById(sectionId);
  if(!el)return;
  if(items.length===0){
    el.innerHTML='<div class="empty">暂无</div>';
    return;
  }
  var html='';
  items.forEach(function(a){
    var digestMd = marked.parse(a.digest||'');
    var contentMd = marked.parse(a.content||'');
    html+='<div class="card"><div class="card-inner" onclick="this.classList.toggle(\'expanded\')">'+
      '<div class="card-title">'+a.title+'</div>'+
      '<span class="source-tag">'+a.source+'</span>'+
      '<div class="card-digest">'+digestMd+'</div>'+
      '<div class="card-content">'+(a.content?('<div style="margin-bottom:8px">'+contentMd+'</div>'):'')+
      '<a href="'+a.link+'" target="_blank">📖 微信原文</a></div>'+
      '</div></div>';
  });
  el.innerHTML=html;
}
