<script>
const ARTICLES = [{"title": "AI投入猛增 字节跳动去年净利润下滑超70%", "source": "财联社AI daily", "link": "https://mp.weixin.qq.com/s/yZSBzso29ZLBPjOVr-AXxg", "html": "<p>《科创板日报》20日讯，知情人士向《科创板日报》记者透露，字节跳动2025年净利润同比下滑超过70%，净利润率也出现了大幅下滑，背景在于该公司在去年三四季度大幅增加了对于AI业务的投入。与此同时，字节跳动2025年海外营收增长近50%，远超约20%的国内增幅，海外业务营收占比也从2024年的25%上探至三成以上，再创历史新高。TikTok Shop 2025年GMV同比增速接近70%，是字节跳动海外营收占比提升的主要动力。字节跳动对以上数据未予置评。（记者 王耐 田野）</p>"}, {"title": "Anthropic暴力封杀！60人Claude一夜断供，网友：千万别豪赌一个AI", "source": "新智元", "link": "https://mp.weixin.qq.com/s/cUphaEydMDC-JOXTXjJzrA", "html": "<p>新智元报道</p>\n\n<p>编辑：桃子</p>\n\n<p>【新智元导读】</p>\n\n<p>60多个Claude账号一夜之间被集体「拔插头」！没有预警，申诉无门，整个公司业务瞬间瘫痪。这场席卷开发者圈的「封号风暴」，撕开了Anthropic傲慢的底裤。</p>\n\n<p>心态彻底崩了！</p>\n\n<p>一家服务数百万用户的金融科技公司CTO，早上打开电脑，准备用Claude处理积压的工作——</p>\n\n<p>突然发现：公司60多个人的账号，一夜之间全部被封。</p>\n\n<p>没有任何预警，只有一封冰冷的邮件：</p>\n\n<p>「检测到违反使用政策的自动化信号，您的账号已被暂停」。</p>\n\n<p>想要申诉？必须填写谷歌表单。</p>\n\n<p>从工程师到产品经理到运营，所有人用来写代码、做分析、处理日常工作的工具，同一时间被「集体拔掉插头」。</p>\n\n<p>消息一出，瞬间登上了热搜。</p>\n\n<p>有网友给出忠告：对如果你在经营一家公司，千万别把所有赌注，压在一个AI供应商身上。</p>\n\n<p>一</p>\n\n<p>觉醒来，60人Claude全被封</p>\n\n<p>Belo不是什么无名小卒。</p>\n\n<p>这是一家在拉美市场拥有数百万用户的金融科技应用，团队超过60人，日常工作重度依赖Claude——</p>\n\n<p>从代码审查到客户服务，从文档撰写到数据分析，Claude已经渗透进了他们的每一条业务血管。</p>\n\n<p>然后Anthropic一刀下去，全给斩断了。</p>\n\n<p>所有的对话历史，没了。所有的集成工具，瘫了。所有基于Claude构建的工作流，归零。</p>\n\n<p>Belo的CTO Pato Molina在X上，发出了那条震动开发者圈的帖子：</p>\n\n<p>你们毫无理由地封禁了我们整个组织的60多个账号。没有任何解释。</p>\n\n<p>唯一的申诉方式是填一个Google表单？这是什么客户服务？</p>\n\n<p>一时间，评论区炸了。</p>\n\n<p>所有人心中都悬着同一个疑问：下一个被「开刀」的，会不会是我？</p>\n\n<p>事实上，倒霉蛋也不只有Belo一个，类似的遭遇正在开发者社区蔓延。</p>\n\n<p>回到事件本身。</p>\n\n<p>Belo团队在发现账号被封后，立刻向Anthropic提交了申诉。</p>\n\n<p>等待的过程有多煎熬不用想象，60个人的工作流停摆，每一分钟都在烧钱。</p>\n\n<p>万幸的是，他们提前部署了Gemini，并无缝接入了现有工作流，才不至于彻底瘫痪。</p>\n\n<p>Gemini急救场</p>\n\n<p>没等来Anthropic解释</p>\n\n<p>Anthropic的「安全团队」的复函姗姗来迟。邮件内容简洁得近乎冷酷——</p>\n\n<p>你的账号因违反使用政策被禁用。收到申诉后，经调查，已恢复。对造成的不便表示歉意。</p>\n\n<p>耐人寻味的是，这封邮件完美地回避了所有关键问题。</p>\n\n<p>违反了哪条政策？调查发现了什么？为什么60个账号要一起封？为什么恢复了？是误判还是政策变更？</p>\n\n<p>一个字都没说。</p>\n\n<p>这次惨痛的翻车事故，给Pato Molina和团队上了一堂刻骨铭心的课。</p>\n\n<p>它也向所有深度依赖AI的软件公司敲响了警钟：</p>\n\n<p>不要把核心业务的命脉，锁在同一个「篮子」里。</p>\n\n<p>诚然，多模型并行的策略是一把双刃剑。</p>\n\n<p>它的核心防御价值在于「业务连续性」。</p>\n\n<p>当像Belo遭遇的那样，Claude毫无征兆地全线宕机时，你手中必须握有备选方案。</p>\n\n<p>虽然Gemini可以补位，但紧急切换的代价极高：所有的上下文对话、复杂的集成流程都将化为乌有。</p>\n\n<p>这种「阵痛」虽不致命，但足以让团队在漫长的适应期中精疲力竭。</p>\n\n<p>反之，多平台架构的代价，则是指数级增长的复杂度。</p>\n\n<p>团队需要适配多套接口，针对不同平台进行反复培训，这背后的时间与资金成本极高。此外，跨平台的集成与后期维护，更是一场繁琐的「工程噩梦」。</p>\n\n<p>在实操中，很多公司最终会与某些服务记录良好的供应商（如Slack、Gmail、Notion等）「锁定」在一起。</p>\n\n<p>但让人无法接受的是，一个服务竟然可以在没有任何预先通知、也无法联系技术支持的情况下，直接就下线了。</p>\n\n<p>突「拔插头」，不止一次了</p>\n\n<p>如果Belo事件是个孤例，我们可以把它当成一次普通的技术乌龙翻过去。</p>\n\n<p>但它不是。</p>\n\n<p>就在一周前，OpenClaw之父Peter Steinberger发帖称，自己的Claude账号因「可疑活动」被封。</p>\n\n<p>几个小时后，一位Anthropic工程师在评论区现身，表示「从未因使用OpenClaw封禁过任何人」。</p>\n\n<p>没想到，就在第二天Peter的账号就恢复了。</p>\n\n<p>更早的时候，今年1月，Anthropic收紧了对第三方工具接入Claude的安全措施。</p>\n\n<p>VB报道称，Anthropic的技术人员公开承认，这次收紧「造成了意外的附带损害」。一些用户账号被自动化系统误封。</p>\n\n<p>受影响的包括，通过Cursor等IDE使用Claude集成的开发者。</p>\n\n<p>与此同时，就在本周，多名用户在Reddit和X上报告称，自己的Claude付费账号被错误地标记为「未成年人」而遭到封禁。</p>\n\n<p>一个成年人，付着Pro的钱，被AI系统判定为小孩然后踢出门外</p>\n\n<p>——这种荒诞程度，连黑镜编剧都不敢这么写。</p>\n\n<p>全压Claude？那就是在「赌命」</p>\n\n<p>如前所述，Pato Molina在事后总结了一条血泪教训：</p>\n\n<p>千万不要把所有鸡蛋放在一个篮子里。</p>\n\n<p>这话放在2026年的AI圈，不是一句鸡汤，而是一条生存法则。</p>\n\n<p>Belo的60个人最终拿回了账号。15个小时的噩梦结束了。表面上看，故事有了一个「圆满」的结局。</p>\n\n<p>但那个问题还悬在每一个AI深度用户的头上——</p>\n\n<p>你的整个工作流建立在Claude上？</p>\n\n<p>那就问问自己：如果明天Claude消失了，你的公司还能不能运转？</p>\n\n<p>如果答案是「不能」，那你不是在使用AI工具，</p>\n\n<p>你是在赌命</p>\n\n<p>。</p>\n\n<p>参考资料：</p>\n\n<p>https://x.com/patomolina/status/2045281665363386504?s=20</p>\n\n<p>秒追ASI</p>\n\n<p>⭐点赞、转发、在看一键三连⭐</p>\n\n<p>点亮星标，锁定新智元极速推送！</p>"}, {"title": "DeepSeek迎来首轮外部融资；Hermes Agent抄袭风波官方回应；OpenAI科研负责人与Sora研究员离职｜Q资讯", "source": "InfoQ", "link": "https://mp.weixin.qq.com/s/gyf2qgCx8CLo-A-gBq7ATg", "html": "<p>整理 ｜ Ziyu</p>\n\n<p>行业热点</p>\n\n<p>DeepSeek 开启首次外部融资</p>\n\n<p>当地时间 4 月 17 日，The Information 报道称，</p>\n\n<p>DeepSeek 计划以不低于 100 亿美元的估值，筹集至少 3 亿美元资金</p>\n\n<p>。这是 DeepSeek 成立以来的首次外部融资。目前 DeepSeek 正在与投资者接触。</p>\n\n<p>这是梁文锋创立 DeepSeek 三年来的首次妥协，打破了国产 AI“纯技术驱动”的固有叙事，也揭开了中国 AI 在算力封锁、人才流失、生态薄弱下的真实困境，成为 2026 年国产 AI 发展的重要转折点。</p>\n\n<p>从背景来看，DeepSeek 的融资转折，是整个国产 AI 行业困境的缩影。</p>\n\n<p>当前，美国持续收紧 AI 算力出口管制，掌握全球 75% 领先 AI 算力的美国，限制英伟达高端芯片对华出口，国产 AI 企业面临严重的算力缺口。</p>\n\n<p>消息传出后，迅速在投资圈引发热议。此前，DeepSeek 由对冲基金幻方量化独家提供资金支持，并曾多次拒绝顶级风投及科技巨头的投资邀约。例如在今年年初，市场曾传出消息称阿里有意投资 DeepSeek，但很快被 DeepSeek 辟谣。</p>\n\n<p>截至发稿，DeepSeek 并未就此次融资消息作出官方回应。</p>\n\n<p>“一人公司”，迎来大爆发</p>\n\n<p>据新华社报道，“一人公司”正在悄然流行。今年 3 月，国家市场监督管理总局相关课题组发布的《中国 OPC 发展调研报告 2026》显示，我国 OPC 发展呈快速增长态势，地域上集聚于长三角、珠三角、京津冀及中西部新兴产业城市，行业分布呈现“轻资产、高智力、新业态”特点，创业者以 90 后、00 后为主。</p>\n\n<p>这里的 OPC，指的就是“一人公司”（One Person Company）：由一个人独立完成决策、运营与执行，既是老板，也是员工，甚至兼任产品经理、市场、客服等多重角色。这种组织形态以极低的启动成本和高度灵活性为特征，往往依托平台工具、数字技术与内容分发渠道，实现从创意到变现的闭环。</p>\n\n<p>青岛有个叫郑海峰的年轻人，2026 年注册了一家公司——焱森垚数字文化创意内容制作有限公司。这家公司\"只有她一个人\"。不是说她能力平庸，恰恰相反。她的 AI 员工们各司其职：AI 负责宣发，AI 负责推广，AI 处理财务。她本人只做一件事：</p>\n\n<p>让这些 AI 员工协同运转，然后接单。</p>\n\n<p>你可能觉得这听起来像个 PPT 里的概念。但现实是，这家公司已经实际运转了。</p>\n\n<p>一个人，通过 AI 工具，独立完成从设计、研发到市场投放的全链路——这种事在 2023 年还是天方夜谭，在 2025 年开始零星出现，在 2026 年已经成了可以被规模化复制的商业路径。</p>\n\n<p>当大模型的 API 价格从 2023 年的\"贵到离谱\"降到 2026 年的\"几乎白送\"，当 AI Agent 的开发框架从\"极客专属\"变成\"有手就会\"，当支付、税务、社保的一切手续都可以线上完成——一个人注册一家公司、运转一家公司、服务真实客户这件事，门槛已经低到尘土里了。</p>\n\n<p>不是你的能力变强了，是工具把所有人拽到了同一条起跑线上。</p>\n\n<p>“一人公司”的兴起改变了行业的竞争规则与协作模式，传统的产业链协作、规模化生产逻辑被打破，行业逐渐向精细化、轻量化、个性化方向转型。</p>\n\n<p>宇树机器人绊到马路牙子摔进草坪</p>\n\n<p>今日 7 点 30 分，2026 北京亦庄人形机器人半程马拉松正式开跑。100 余支队伍的机器人将从科创十七街起跑，一路穿越城市高楼、湖景繁花，最终在南海子公园冲线。</p>\n\n<p>早在今早 6 时许，选手已经开始陆续进场。赛道全长约 21 公里，融合平地、坡道、弯道、狭窄路段等十多种地形，12 个左转道、10 个右转道，包含接近 90°的弯道，十分考验机器人的路径规划与动态平衡能力。比赛中，备受关注的宇树机器人起跑不久就意外摔倒，这让现场观众不禁为之紧张。‌‌</p>\n\n<p>最终，根据赛事加权规则，来自荣耀的齐天大圣战队自主导航机器人“闪电”以 50 分 26 秒（净用时）的成绩夺得冠军。目前人类半程马拉松的纪录为 57 分 20 秒。</p>\n\n<p>OpenAI 剥离「副业项目」：公司科学研究项目负责人与 Sora 研究员双双离职</p>\n\n<p>4 月 19 日消息，OpenAI 旗下两大核心项目的关键负责人双双离职。该公司科学研究项目负责人凯文 · 威尔，以及人工智能视频工具 Sora 背后的研究员比尔 · 皮布尔斯，均于当地时间周五宣布离职。此次人事变动正值 OpenAI 聚焦企业级人工智能业务，并筹备推出其即将面世的「超级应用」之际。</p>\n\n<p>皮布尔斯在社交媒体的离职声明中表示，Sora 的出现「推动了整个行业在视频领域的大量投资」，并认为研发这类视频工具所需的研究，需要脱离公司核心业务路线，拥有独立的发展空间。他写道：「保持研究的多元与发散性，是一家实验室实现长期蓬勃发展的唯一途径。」</p>\n\n<p>据《连线》杂志报道，OpenAI 企业应用首席技术官斯里尼瓦斯 · 纳拉亚南也将离职。据悉，纳拉亚南已在内部宣布离职消息，称此举是为了有更多时间陪伴家人。</p>\n\n<p>传 Meta 下月启动首轮大裁员，近 8000 名员工成 AI 发展”牺牲品“</p>\n\n<p>北京时间 4 月 18 日凌晨，据路透社援引三名知情人士消息称，Meta 计划于 5 月 20 日启动今年首轮大规模裁员，后续还将继续推进相关调整。</p>\n\n<p>其中一位知情人士表示，首轮裁员规模约为全球员工总数的 10%，接近 8000 人。消息人士还称，公司将在今年下半年继续裁员，具体时间和规模尚未确定，管理层或依据 AI 发展程度对计划进行调整。先前的消息称，Meta 整体裁员比例或不少于 20%。</p>\n\n<p>近期公司已对 Reality Labs 部门进行重组，并将各部门工程师调入新设立的「应用 AI」团队，负责推进能够编写代码并自主执行复杂任务的 AI 智能体开发。</p>\n\n<p>消息人士还表示，部分员工将被调入上月成立的 Meta Small Business 部门，作为此次重组的一部分。</p>\n\n<p>明星 AI 项目 Hermes Agent 被曝抄袭中国团队，公司回应</p>\n\n<p>4 月 15 日，中国 AI 团队 EvoMap 公开表示，硅谷明星 AI 项目 Hermes Agent 核心自进化能力，系对其 Evolver 引擎的系统性复刻，后者态度两次回应均否认。</p>\n\n<p>在 EvoMap 发布的技术报告中，其以 GitHub 公开时间戳、源码结构、架构设计、术语体系、进化循环等可交叉验证的证据链，直指 Hermes Agent 自进化模块与 Evolver 引擎高度同构。争议的核心指向自进化架构的来源归属。EvoMap 给出清晰且可核验的时间线：</p>\n\n<p>2 月 1 日，Evolver 开源并公开 GEP 核心设计；</p>\n\n<p>2 月 16 日，团队发布 GEP 深度解析，完整披露 Scan-Select-Mutate-Validate-Solidify 主循环与三级记忆体系；</p>\n\n<p>2 月 25 日，Hermes Agent 发布 v0.1.0，定位为初始基础版本；</p>\n\n<p>3 月 9 日，Hermes Agent 专门创建自进化独立仓库；</p>\n\n<p>3 月 12 日，Hermes Agent v0.2.0 推出技能生态系统，核心自进化功能正式上线。</p>\n\n<p>从核心架构公开到 Hermes 对应功能上线，时间差仅 24 至 39 天，这一时间窗口成为 EvoMap 指控的关键依据。双方均采用任务完成后自动提取可复用经验的闭环，均设置周期性自我评估与反射机制，均实现技能运行时发现与按需加载。</p>\n\n<p>关键的是，Evolver 的 10 步进化主循环，与 Hermes 自进化模块的 10 步执行流程一一对应，同时存在 12 组核心术语的系统性替换，如 Gene 对应 SKILL.md、Capsule 对应技能执行记录、solidify 对应 skill_manage (create) 等。而在 Hermes 全部 7 份公开材料中，对先行开源的 Evolver 与 GEP 协议零引用、零致谢、零归属。</p>\n\n<p>EvoMap 列出的基于 GitHub 仓库元数据和官方发布记录</p>\n\n<p>EvoMap 表示，在最初的两个多月里，团队把最核心的 GEP 协议、三层记忆体系、周期性反射循环，全部坦诚地抛给了社区。“因为我们觉得，在这个 AI 狂奔的时代，透明和开放是我们能做出的最酷的姿态。我们没有藏着掖着，把底牌都摆在了桌面上。但现实给我们上了一课。”</p>\n\n<p>面对详实指控，Hermes Agent 所属实验室 Nous Research 先后两次表态。首次回应由官方账号发出，称其项目仓库于 2025 年 7 月已创建，自诩为现代 Agent 框架底层技术先驱，并要求 EvoMap“删除账号”，随后删帖并拉黑对方成员。</p>\n\n<p>第二次回应来自 Nous 联合创始人 Teknium，他表示，“我这辈子从来没有听说过这个人、他的项目，或者他正在做的任何事情。今天是我第一次听说或看到这个项目。毫无证据地声称我剽窃了他们的作品，这是谎言。”</p>\n\n<p>Hermes 方的反驳逻辑有二：一是仓库创建时间早于 Evolver，证明技术先发；二是底层依赖学术开源项目，架构设计系独立收敛。</p>\n\n<p>4 月 17 日晚，Hermes Agent 业务负责人 Tommy Eastman 来中国，在 B 站开直播。</p>\n\n<p>弹幕刷屏的问题只有一个：你们到底有没有抄 EvoMap？</p>\n\n<p>Tommy 的回应：</p>\n\n<p>\"Hermes Agent 的代码仓库已经存在一年多了。直到那些推文出现，我才听说 EvoMap。Nous Research 有长期产出前沿研究的记录，我们是理念驱动的团队，除了推动开源 AI，不会做任何其他事情。\"</p>\n\n<p>EvoMap 随即指出，Hermes 仓库虽较早建立，但长期私有，2 月底才公开基础版本，被质疑的自进化能力直至 3 月中旬才完整推出，所谓先发优势无法覆盖争议功能；而 GEPA 与 GEP 分属优化算法与进化协议，不能解释上层架构、循环流程、记忆体系的高度重合。</p>\n\n<p>热搜第一！员工中 1500 万元彩票后离职？科大讯飞最新发文</p>\n\n<p>4 月 13 日凌晨，</p>\n\n<p>小红书有消息称科大讯飞员工中 1500 万大奖后辞职引发广泛关注，瞬间登上热搜。</p>\n\n<p>13 日下午，科大讯飞官方微博就此事发布回复，其微博称：我们关注到网传我公司员工中奖的相关信息。如果真有同事这么幸运，我们真心为他高兴。比起可遇不可求的运气，我们更在意为每位伙伴提供“看得见、摸得着”的保障，那就是一份有竞争力的薪酬，一个持续成长的空间，一套安心的福利支持。相信美好的事情总会发生！</p>\n\n<p>当日，</p>\n\n<p>有记者从知情人士处获悉，确有员工中奖情况，但金额与网传信息不符。</p>\n\n<p>至于是否离职，科大讯飞方面称无法回复。</p>\n\n<p>抖音打击赌博导流黑产，日均封禁相关账号超 1 万个</p>\n\n<p>抖音 4 月 17 日公告称，近期，平台监测发现，有黑产团伙通过展示豪华酒店设施、发布隐晦暗语等方式，规避平台监管，将目标用户导流至站外实施涉赌行为。对此，平台第一时间对违规账号进行处置，并持续加大对赌博导流黑产的打击力度，强化涉赌内容治理。</p>\n\n<p>2026 年以来，抖音共处罚涉及赌博的违规直播间 5.5 万个，对 1.4 万个账号无限期回收直播权限；针对赌博导流黑产，日均封禁相关账号超 1 万个。2025 年至今，平台主动上报的线索中，因涉及赌博引流，已有 148 人被刑事拘留，6 个相关犯罪团伙被捣毁。</p>\n\n<p>抖音严禁用户利用平台服务实施组织赌博、招募赌博人员等违法犯罪行为，严禁制作、发布、传播任何赌博相关内容，严禁通过各类伪装手段为线下或第三方平台赌博活动导流，包括但不限于：展示国内线上、线下赌博（含六合彩）或宣扬赌博、诱导他人参与赌博的内容；为赌博场所引流或展示赌博相关场景的内容；展示、宣传、教授赌博技巧，以及售卖发牌技术、千术、千术工具等相关内容。</p>\n\n<p>最后，抖音提醒广大用户提高警惕，主动抵制赌博相关违法违规行为，如在抖音发现相关违规内容，可直接举报或发送邮件至 feedback@douyin.com，平台将第一时间核实处置。</p>\n\n<p>AI 快讯</p>\n\n<p>消息称马斯克 xAI 进军 AI 智能编程领域，有望下周发布 Grok Build</p>\n\n<p>科技媒体 testingcatalog 近日发布博文，报道称埃隆 · 马斯克（Elon Musk）旗下 xAI 公司有望进军智能编程领域，可能会在下周推出 Grok Build 与 Grok CLI 两款产品。</p>\n\n<p>此举标志着 xAI 正式进入智能编程赛道，将与 Claude Code、OpenAI Codex 及 Google Jules 等主流工具展开直接竞争。</p>\n\n<p>在核心模型层面，xAI 已悄然推送 Grok 4.3 Early Access 测试版，目前仅向 Grok Heavy 订阅用户开放。这一进展改变了 Grok Build 的技术路径：xAI 可能不再单独开发专用编程模型，而是直接依托 Grok 4.3 支撑编程功能。</p>\n\n<p>产品形态上，Grok Build 采用双轨运行机制，用户可通过 CLI 智能体在本地执行任务，也可通过 Web 界面远程操作。目前尚不清楚本地执行的具体机制，不过该媒体认为基于 Electron 的桌面封装方案可能成为最优解。</p>\n\n<p>功能创新方面，Grok Build 预估引入 Parallel 模式与 Arena 模式。Arena 模式支持多个智能体并行处理同一任务，用户可从中择优采纳。</p>\n\n<p>名创优品成立 AI 创新部</p>\n\n<p>4 月 18 日，名创优品正式成立 AI 创新部，隶属数字科技中心。</p>\n\n<p>该部门以智能体 AI 能力建设为核心，聚焦业务决策优化与办公协同智能化。目前面向全社会招聘选址算法工程师、预测算法工程师、Agent 研发工程师、AI 解决方案工程师等关键岗位。此举旨在通过算法与智能体技术深度赋能零售运营，提升数据驱动决策效率与组织协同水平。招聘工作即日启动。</p>\n\n<p>消息称扎克伯格将工位搬进 Meta AI 团队</p>\n\n<p>4 月 15 日消息，据报道，Meta CEO 马克·扎克伯格正以更直接的方式参与 AI 竞赛 —— 甚至把办公桌搬进了 AI 团队。扎克伯格已将办公地点调整至 AI 实验室，与汪滔和纳特·弗里德曼一同办公，并重新开始编写代码。</p>\n\n<p>Meta 总裁迪娜·鲍威尔·麦考密克在华盛顿举行的 Semafor 世界经济峰会上表示，“马克确实把办公桌搬到了 AI 实验室，和汪滔、纳特·弗里德曼坐在一起，而且整天都在写代码。一方面，他们可能会觉得，‘太好了，你又来给建议了，马克，而且还是在写代码的时候。’我认为，他非常坚定地觉得，必须以这种深度去理解，才能思考如何让模型达到最佳状态。”</p>\n\n<p>此前报道显示，扎克伯格不仅每周亲自编写 5 至 10 小时代码，还训练了一个以自身为原型的 AI 数字分身，用于替代本人与员工实时互动。该 AI 角色基于扎克伯格的图像、声音、语气风格及战略思维进行训练，目前仍处于早期阶段，旨在让员工通过与数字分身互动，增强与创始人的连接。此外，一个独立的“CEO 智能体”项目也在同步推进，用于协助扎克伯格处理日常信息检索等事务。</p>\n\n<p>IT 业界</p>\n\n<p>Anthropic 深夜发布 Claude Design</p>\n\n<p>4 月 17 日，Anthropic 发布由 Claude Opus 4.7 模型驱动的设计工具 Claude Design，用户可通过自然语言对话生成 UI 原型、幻灯片、营销素材等设计内容，并支持实时协作与品牌规范自动继承。发布当日，Figma 股价下跌约 6.8%，相关设计工具公司股价同步受挫。</p>\n\n<p>Claude Design 是</p>\n\n<p>Anthropic Labs</p>\n\n<p>下的第二个产品（第一个是上周的 Skills 工具），由</p>\n\n<p>Opus 4.7</p>\n\n<p>驱动——也就是刚发的新模型，官方自己说的 \"most capable vision model\"。</p>\n\n<p>Opus 4.7 与 Claude Design 先后发——这个时间差不是巧合。</p>\n\n<p>产品是绑定模型能力迭代的。</p>\n\n<p>对 Builder 的启示：</p>\n\n<p>当基础模型升级时，要第一时间想清楚——这个升级具体解锁了哪些新产品形态？</p>\n\n<p>不是\"Claude 变强了我也用一下\"，是\"Claude 4.7 的视觉能力解锁了 X 场景的 PMF\"。</p>\n\n<p>微软首日集成 Claude Opus 4.7，GitHub Copilot 等 9 大 AI 工具全面接入</p>\n\n<p>近日，科技媒体 NeoWin 发布博文，报道称在 Anthropic 发布 Claude Opus 4.7 模型后，微软打破与 OpenAI 的排他性合作惯例，在其 GitHub Copilot 等 9 大开发环境中首日集成支持。</p>\n\n<p>有别于以往，微软不再局限于 OpenAI 的 GPT 系列模型，于去年底开始在 Microsoft Foundry 中提供 Claude 模型支持，并逐步扩展至旗下多款产品。</p>\n\n<p>GitHub Copilot 率先集成 Claude Opus 4.7，覆盖 Visual Studio Code、Visual Studio、Copilot CLI 等 9 大开发环境。GitHub 团队宣布，未来几周内 Opus 4.7 将取代 Opus 4.5 和 4.6，成为 Copilot Pro+ 用户的模型选择器默认选项。</p>\n\n<p>Microsoft 365 Copilot 用户现已可在 Copilot Cowork 前沿计划、Copilot Studio 早期发布环境及 Excel 中调用 Claude Opus 4.7。</p>\n\n<p>三星宣布 LPDDR4/4X 年底停产</p>\n\n<p>据韩国媒体 The Elec 报道，其于 4 月 17 日确认，三星电子已正式停止接收 LPDDR4 和 LPDDR4X 的新增订单，标志着这两款量产逾十年的主流内存产品正式进入 EOL（生命周期终结）阶段。</p>\n\n<p>LPDDR4 和 LPDDR4X 是过去十年间智能手机、平板电脑、笔记本电脑等消费电子设备最主流的内存解决方案。LPDDR4 和 LPDDR4X 自 2017 年前后进入大规模量产，凭借低电压设计和优秀的功耗表现，成为全球数十亿台移动设备的标准配置。</p>\n\n<p>The Elec 报道称，三星将于 2026 年 4 月 17 日起停止接收 LPDDR4/4X 一切新增订单，也不再接受客户追加采购需求。考虑到末批订单的时间节点，LPDDR4 和 LPDDR4X 的生产预计将延续至 2026 年年底，产线转换工作则将于 2027 年第一季度正式展开，届时 LPDDR4/4X 将彻底停产，产能全部转向 LPDDR5、LPDDR5X 移动 DRAM 及 HBM 高带宽内存。</p>\n\n<p>业界普遍认为，此次订单窗口的持续时间已超出预期，根本原因在于客户端需求持续旺盛。这一局面虽帮助客户充分锁定了部分 LPDDR4 系列内存供应，但也相应推迟了三星产线转换的节奏。</p>\n\n<p>三星此次计划停产 LPDDR4 系列，最核心的原因在于 HBM（高带宽内存）和先进 DDR5 产品的利润率更高。叠加 AI 浪潮下先进内存供不应求，三星希望将有限晶圆、产能资源全部倾斜到利润率更高的产品线上，不再维持低利润旧代产品产能。预计此举将直接影响三星自身移动业务部门及众多的外部客户。</p>\n\n<p>今日好文推荐</p>\n\n<p>没身份证用不了AI？Claude开始查“户口”了</p>\n\n<p>AI提效20%，我们程序员加班却越来越狠：老板量生产力的尺子，歪了？</p>\n\n<p>苹果疯狂狙击Vibe Coding App</p>\n\n<p>100个产品原型同时跑、新模型Mythos断层领先，连skills效果都好到让团队意外：Anthropic内部到底在发生什么？</p>\n\n<p>会议推荐</p>\n\n<p>世界模型的下一个突破在哪？Agent 从 Demo 到工程化还差什么？安全与可信这道坎怎么过？研发体系不重构，还能撑多久？</p>\n\n<p>AICon 上海站 2026，4 大核心专题等你来：世界模型与多模态智能突破、Agent 架构与工程化实践、Agent 安全与可信治理、企业级研发体系重构。14 个专题全面开放征稿。</p>\n\n<p>诚挚邀请你登台分享实战经验。AICon 2026，期待与你同行。</p>"}, {"title": "Opus 4.7重新登顶榜单，但强得多的GPT-5.5极大概率下周就发", "source": "新智元", "link": "https://mp.weixin.qq.com/s/N2HxOzV2aXgbZTVAsMzlIw", "html": "<p>新智元报道</p>\n\n<p>编辑：艾伦</p>\n\n<p>【新智元导读】</p>\n\n<p>Opus 4.7 在综合榜和代码榜同时登顶，优势集中在长任务执行、工具调用和工程工作流完成率。Anthropic 借这次升级稳住了企业级 AI 市场里最接近预算和采购的那块位置。</p>\n\n<p>本周，Anthropic 发布 Claude Opus 4.7。</p>\n\n<p>它在两份最受关注的公开评测里重新登顶。</p>\n\n<p>Artificial Analysis 的综合智能榜单上，Opus 4.7 拿到 57 分，高于上一代 Opus 4.6 的 53 分，进入第一梯队；</p>\n\n<p>Arena.ai 最新公布的 Code Arena 结果里，Opus 4.7 排名第一，得分 1583，较 Opus 4.6 Thinking 的 1549 提升 34 分，也领先榜上下一家非 Anthropic 模型一大截，同时拿下 React 和 HTML 两个子榜第一。</p>\n\n<p>这轮榜单变化的意义，更像一次市场校准。</p>\n\n<p>过去两年，大模型行业热衷讨论能力边界，谁参数更大，谁推理更长，谁演示更惊艳，谁更接近那个永远在路上的 AGI。</p>\n\n<p>到了 2026 年，企业客户的判断标准已经换了。</p>\n\n<p>客户越来越少追问谁最像一个全科状元，越来越多追问另一件更现实的事：谁能进系统，谁能接流程，谁能把任务稳定做完。</p>\n\n<p>Opus 4.7 这次得分上涨，恰好踩中这套新标准。</p>\n\n<p>Anthropic 官方披露的几组数据，方向非常集中。</p>\n\n<p>在 Anthropic 自建的 93 项编码基准上，Opus 4.7 相比 Opus 4.6 的任务解决率提升了 13%；</p>\n\n<p>在 CursorBench 上，成绩从 58% 提升到 70%；</p>\n\n<p>在 Notion 的多步工作流测试里，整体效果提升 14%，工具调用错误下降到原来的三分之一。</p>\n\n<p>Anthropic 官网列举的客户反馈也都围绕同一类能力展开：自主推进、少犯错、遇到工具失败时还能继续执行。</p>\n\n<p>这些数字拆开看都不算戏剧化，放在一起却很说明问题。</p>\n\n<p>Opus 4.7 的进步集中在最难规模化、也最容易决定商业化成败的那部分能力上：长任务执行、跨步骤衔接、工具调用稳定性，以及在信息不足时保持克制。</p>\n\n<p>单步问答的领先，越来越像发布会上的视觉效果；</p>\n\n<p>长链路任务里的稳定表现，才更接近企业愿意付钱的理由。</p>\n\n<p>模型要读代码仓库，要改多个文件，要处理依赖错误，要在失败后继续往前推，还要知道什么时候该停下来。</p>\n\n<p>很多系统的问题从来不在某一步答错，而是流程一拉长就开始松动，最后还是要人接手收尾。</p>\n\n<p>Anthropic 过去一年的路线，也一直围着这件事打。</p>\n\n<p>它没有把主要精力放在最容易被普通用户感知的聊天体验上，而是持续把模型往「执行单元」上推。</p>\n\n<p>编码、知识检索、文档审阅、法律研究、金融分析，这些环节容错率低、单位价值高，也最容易形成企业级采购。</p>\n\n<p>Anthropic 官网这次列出的合作与反馈对象，包括 Cursor、Notion、Rakuten、CodeRabbit、Warp、Vercel、XBOW 等公司，几乎全部对应明确的工作流，而不是泛化的消费级场景。</p>\n\n<p>这也是 Opus 4.7 这轮发布最值得关注的地方。</p>\n\n<p>Anthropic 抢的从来都不是最热闹的用户入口，而是企业预算最集中的入口。</p>\n\n<p>OpenAI 仍然拥有最强的公众注意力，谷歌仍然掌握平台和基础设施优势，开源阵营则继续用更低成本压缩闭源模型的利润空间。</p>\n\n<p>Anthropic 的路线一直更窄，也更清楚。</p>\n\n<p>它想进入的，是那些已经能被计算 ROI 的工作环节。</p>\n\n<p>模型一旦进入代码生成、文档处理、金融分析、法律研究这些流程，带来的就不是一次性惊叹，而是可以被量化的人力替代率、时间压缩率和错误率下降。</p>\n\n<p>试点能否转成采购，采购能否转成复购，通常就在这里决定。</p>\n\n<p>榜首当然重要，但它也没有终局意味。</p>\n\n<p>Arena 公布的细分结果显示，Opus 4.7 在 Overall、Expert、Coding 等项目上更强，Creative Writing 也有提升；</p>\n\n<p>但在部分分类里，上一代 Opus 4.6 仍然领先。</p>\n\n<p>这反而说明前沿模型之间的竞争，已经从代际式跨越，收缩成任务结构和能力配比的差异。</p>\n\n<p>市场不再等待一个通吃一切的统一模型，而是在不同任务里寻找更适合的工具。</p>\n\n<p>谁在工程任务上更强，谁在多模态上更顺，谁在价格上更有压迫感，座次会不断变化。</p>\n\n<p>也正因为如此，Opus 4.7 的时间点很关键。</p>\n\n<p>它发布前后，市场另一条高频话题是 OpenAI 下一代模型 GPT-5.5 的传闻，Polymarket 上相关押注也一度升温。</p>\n\n<p>眼下这些更多还停留在预期层面。</p>\n\n<p>真正能进入企业评估流程的，仍然是已经发布、已经评测、已经可以接入系统的模型。</p>\n\n<p>Anthropic 这次并不需要证明 Opus 4.7 是未来半年里的绝对最强模型，它更现实的目标，是在下一轮更大规模的模型发布潮到来之前，把自己重新放回企业客户和平台方的重点名单里，并且给出一套足够具体、足够可采购的理由。</p>\n\n<p>现在看，这套理由已经成立。</p>\n\n<p>综合榜成绩、代码榜成绩、长任务能力提升、工具调用错误下降，这些指标拼在一起，构成了一个很清楚的市场信号：Anthropic 拿出了一款更适合进入生产系统的旗舰模型。</p>\n\n<p>对于企业用户来说，这种信号比任何宏大的技术叙事都更有说服力。</p>\n\n<p>采购不会因为一家公司的故事更动人而发生，只会因为另一家公司更可能稳定交付结果而发生。</p>\n\n<p>Anthropic 想拿下的，则是下一轮企业级 AI 市场里更高的定价权。</p>\n\n<p>参考资料：</p>\n\n<p>https://x.com/ArtificialAnlys/status/2045292578434875552</p>\n\n<p>https://x.com/arena/status/2045194638630560104</p>\n\n<p>https://x.com/Polymarket/status/2045616553308147936</p>\n\n<p>https://x.com/daniel_mac8/status/2045505817709838487</p>\n\n<p>秒追ASI</p>\n\n<p>⭐点赞、转发、在看一键三连⭐</p>\n\n<p>点亮星标，锁定新智元极速推送！</p>"}, {"title": "刚刚，Claude被扒底裤！Mythos算力带不动，万亿估值全靠末日恐慌?", "source": "新智元", "link": "https://mp.weixin.qq.com/s/v6Cmogd-m7dmHDO_CEB-Kg", "html": "<p>新智元报道</p>\n\n<p>编辑：KingHZ</p>\n\n<p>【新智元导读】</p>\n\n<p>当技术神话、算力危机和资本野心撞在一起，一场比「AI取代人类」更惊心动魄的现实大戏，才刚刚开始。</p>\n\n<p>先让你害怕，再让资本兴奋，这可能才是这场「AI取代白领」预言最真实的剧本。</p>\n\n<p>Dario Amodei不断描绘一个岗位大面积蒸发的未来，像是在敲响警钟：</p>\n\n<p>1到5年内，50%的科技岗位、初级律师、咨询师和金融专业人士，将被</p>\n\n<p>AI</p>\n\n<p>完全取代。</p>\n\n<p>这足以让全球打工人彻夜难眠。</p>\n\n<p>社交网络瞬间炸锅，无数白领陷入FOMO（错失恐惧）与生存焦虑中。</p>\n\n<p>但你是否想过，这位被特朗普痛骂为「激进左翼疯子」、掌舵着全球增长最快AI巨头的天才掌门人，真的是在好心为你预警吗？</p>\n\n<p>你以为他在讨论你的工作，他真正想撬动的，或许是华尔街的钱。</p>\n\n<p>如果我们把视线从打工人的饭碗，移向黑石、富达等华尔街巨头的钱袋子，剥开这家估值飙升至3800亿美元公司的公关话术，你会发现一个令人战栗的资本阳谋。</p>\n\n<p>第一层剥茧</p>\n\n<p>Mythos降临与12个月的倒计时</p>\n\n<p>如果把一个「天才国度」塞进硅谷的机房里，会发生什么？</p>\n\n<p>4月7日，Anthropic发布的Claude Mythos给出了答案。</p>\n\n<p>它在SWE-bench编程基准测试中跑出了93.9%的恐怖数据；在网络安全演练中，它像一个幽灵般穿梭，揪出了潜伏在人类操作系统中长达27年之久的「零日漏洞」。</p>\n\n<p>外界质疑大模型是否触及了天花板，Amodei却像个狂热的布道者般回应：</p>\n\n<p>彩虹没有尽头，只有彩虹本身。</p>\n\n<p>我们看不到任何技术放缓的迹象。</p>\n\n<p>然而，就在他吹响无尽算力（Big Blob of Compute）的号角时，现实的达摩克利斯之剑已经悬在头顶。</p>\n\n<p>Amodei自己承认，面对大洋彼岸的追赶者，Anthropic的领先身位可能只剩下短短6-</p>\n\n<p>12个月</p>\n\n<p>。</p>\n\n<p>在国家级力量的科技博弈面前，没有任何技术护城河是绝对安全的。没有优雅的魔法对轰，只有无尽的、充满泥泞的狂奔。</p>\n\n<p>第二层剥茧</p>\n\n<p>安全主义华丽长袍里，爬满了算力「虱子」</p>\n\n<p>面对Mythos如此逆天的能力，Anthropic对外宣称：为了安全与防滥用，我们必须推迟并限制它的全面发布。</p>\n\n<p>听起来是不是极其负责任？</p>\n\n<p>直到英国《金融时报》（FT）毫不留情地扒下了这件「安全主义」的底裤。</p>\n\n<p>FT引述多位知情人士的爆料，戳破了这一神话：</p>\n\n<p>真正拖慢模型广泛发布的，与其说是「太危险不敢放」，不如说是</p>\n\n<p>「</p>\n\n<p>太吃资源，根本带不动</p>\n\n<p>」</p>\n\n<p>。</p>\n\n<p>Anthropic的服务器屡次遭遇服务中断，他们连稳定服务现有客户都已捉襟见肘。</p>\n\n<p>这是一个极具讽刺意味的反直觉真相：把算力瓶颈包装成安全决策，是硅谷最高级的公关魔法。</p>\n\n<p>当「安全底线」与「算力短缺」重合时，高尚的道德叙事立刻就变味了。</p>\n\n<p>前沿AI的竞争，归根结底不是发论文，而是最朴素的算力、电网与散热器的绞肉机。</p>\n\n<p>第三层剥茧：贩卖恐慌，是最高级的商业路演</p>\n\n<p>让我们回到那个令全网恐慌的「白领末日论」。</p>\n\n<p>图灵奖得主、Meta前首席AI科学家Yann LeCun，直接开炮怒怼：</p>\n\n<p>Dario错了，他对技术革命如何影响劳动力市场一无所知！</p>\n\n<p>LeCun呼吁大家去听专业经济学家，别听这些AI掌门人忽悠。</p>\n\n<p>为什么Amodei要冒着被同行群嘲的风险，天天喊「白领末日」？</p>\n\n<p>因为2026年，Anthropic正准备发起一场超大规模的IPO，目前估值飙升至8000亿美元。</p>\n\n<p>这就是残酷的资本引力。</p>\n\n<p>如果Anthropic的叙事只是「一个提高写代码效率的</p>\n\n<p>SaaS</p>\n\n<p>软件</p>\n\n<p>」，它最多值</p>\n\n<p>几百亿</p>\n\n<p>。</p>\n\n<p>但如果它能「</p>\n\n<p>吞噬并接管整个人类一半的白领劳动力</p>\n\n<p>」，成为新的社会基础设施，那它的想象空间就是</p>\n\n<p>万亿美元</p>\n\n<p>。</p>\n\n<p>他天天喊着「AI毁掉白领工作」，真正想吓到的根本不是打工人，而是生怕错过下一个工业革命的华尔街资本。</p>\n\n<p>这哪里是敲响打工人的丧钟，这分明是递给机构投资者的绝版商业计划书（BP）。</p>\n\n<p>极客的傲慢与资本的引力</p>\n\n<p>在这场权力的游戏里，Amodei是一个充满矛盾的结合体。</p>\n\n<p>他有技术极客的道德洁癖：拒绝五角大楼将AI用于美国国内的大规模监控，宁愿被美国总统骂作「激进的左翼疯子」。</p>\n\n<p>但他同时又希望利用美国政府的力量。</p>\n\n<p>他创办了一家「公益公司」，承诺未来捐出80%的财富，高呼社会不该崇拜科技寡头。</p>\n\n<p>但他的一举一动，却都在精准踩踏着股东资本主义的鼓点——在估值飙升的盛宴中，推波助澜。</p>\n\n<p>历史的吊诡之处在于，</p>\n\n<p>最终决定AGI（通用人工智能）走向的，可能不是实验室里那几十页严谨的「安全对齐协议」，而是华尔街对增长的无尽贪婪，以及「只争朝夕」的生存本能。</p>\n\n<p>在信任稀缺的时代，重建你的护城河</p>\n\n<p>Amodei有一句话说得很对：</p>\n\n<p>「</p>\n\n<p>AI</p>\n\n<p>只能以信任的速度扩散。」</p>\n\n<p>但在当下的世界，算力过剩，恐慌过剩，唯独信任，成了最稀缺的奢侈品。</p>\n\n<p>作为普通人，在这个真假难辨的科技狂飙期，我们该如何自处？以下是三条抵御焦虑的生存法则：</p>\n\n<p>别被「末日论」轻易收割</p>\n\n<p>：</p>\n\n<p>你的竞争对手从来不是AI本身，而是下一个熟练掌握AI工具的普通人。</p>\n\n<p>看透资本的障眼法</p>\n\n<p>：</p>\n\n<p>下次再听到AI大佬的末日惊悚预言，先看看他们公司的融资进度表。关注他们真实的「供给能力」（算力与基础设施），而不是科幻PPT。</p>\n\n<p>倒计时已经响起</p>\n\n<p>：</p>\n\n<p>在接下来的12个月里，随着中国大模型对顶尖能力的全面复刻，AI应用成本将迎来史无前例的暴跌。这是普通人利用AI杠杆完成阶层跃迁的最后、也是最好的窗口期。</p>\n\n<p>风暴已经降临，与其在别人虚构的「神话」（Mythos）里颤抖，不如在现实的泥泞里，建起自己的避难所。</p>\n\n<p>参考资料：</p>\n\n<p>https://x.com/NinaDSchick/status/2045600796226822208</p>\n\n<p>https://x.com/ylecun/status/2045610129119117574</p>\n\n<p>https://www.ft.com/content/9e0e0fc6-ab7d-4b69-a8b1-5a972b82fb06</p>\n\n<p>秒追ASI</p>\n\n<p>⭐点赞、转发、在看一键三连⭐</p>\n\n<p>点亮星标，锁定新智元极速推送！</p>"}, {"title": "大模型架构的下半场", "source": "量子位", "link": "https://mp.weixin.qq.com/s/Ynt7xQTg5wWAf64Szup4Gg", "html": "<p>华中科技大学王兴刚团队 投稿</p>\n\n<p>量子位 | 公众号 QbitAI</p>\n\n<p>研究者们花了十年去扩展层内的计算能力，却忘了扩展层间的通信能力。</p>\n\n<p>这件事亟需被改变。</p>\n\n<p>过去十年，深度学习领域取得进展的方式出奇地一致：什么都往大了整。更多参数、更多数据、更长上下文。而且确实管用：loss在降，能力在涨，</p>\n\n<p>scaling law</p>\n\n<p>（扩展定律）</p>\n\n<p>精确地告诉研究团队还需要投入多少。</p>\n\n<p>但扩展的方向不同，差异也是巨大的。序列长度的扩展需要真正的创新，也确实催生了一整套机制研究和系统工程。数据的扩展则直截了当：数据越多，loss越低。让模型变得更宽、更深，这看起来也和数据的扩展一样简单。</p>\n\n<p>但宽度和深度真的在同等地发挥作用吗？</p>\n\n<p>并非如此。深度在数量上增长了，但在质量上却没有。层与层之间的通信机制几乎没有变化。接下来本文将解释这一点为什么重要，这不仅关乎网络的深度本身，更关于研究团队设计神经网络架构时的一个集体盲区。</p>\n\n<p>上半场</p>\n\n<p>要看清上半场做对了什么，就看看什么被成功地扩展了，以及</p>\n\n<p>是怎么做到的</p>\n\n<p>。</p>\n\n<p>先看序列长度。早期Transformer只能处理几百个token。要达到128K+，需要多个方向上的持续创新：新的注意力模式</p>\n\n<p>（稀疏、线性、混合）</p>\n\n<p>、系统工程</p>\n\n<p>（FlashAttention）</p>\n\n<p>、位置编码的进步</p>\n\n<p>（RoPE scaling）</p>\n\n<p>。研究者和工程师们共同建造了一整个生态，持续改进token之间的通信方式。而回报颇丰，研究团队不止能够处理极其长的文档，还为OpenAI-O1和DeepSeek-R1的长链推理奠定了坚实的基础。这就是当研究团队认真投资于“信息在序列维度上的</p>\n\n<p>流动方式</p>\n\n<p>时”，所收获的斐然成果。</p>\n\n<p>△</p>\n\n<p>现代LLM中的参数与数据规模迅速增长</p>\n\n<p>参数和数据的扩展是最符合人类直觉的部分。从深度学习的最早期开始，每本教科书都在教授同一套配方：更多数据、更宽的层、更深的网络，自然带来更好的表征。从GPT-2的15亿参数到如今的数万亿，这套配方一直管用。</p>\n\n<p>这似乎说明大模型团队不需要引入新机制，只需要持续拓展这些被验证了的方向。</p>\n\n<p>只不过，对网络而言，</p>\n\n<p>更宽</p>\n\n<p>和</p>\n\n<p>更深</p>\n\n<p>往往并不是一回事。宽度的扩展是自然而然的：现代GPU天生擅长处理更宽的矩阵乘法，注意力机制的演进越来越高效，这使得更宽的网络可以无缝接入现有架构。</p>\n\n<p>而深度则是另一个故事。模型确实变深了：研究团队将模型加到32层、64层、甚至100层以上。但层间通信的机制本质上还是ResNet在2015年引入的深度残差，“</p>\n\n<p>x + F(x)</p>\n\n<p>”。自它诞生以来，围绕它有过不少改良</p>\n\n<p>（归一化位置、残差缩放、跨层连接）</p>\n\n<p>，但没有任何改良真正取代过那个深度残差中“</p>\n\n<p>+</p>\n\n<p>”的决定性地位。</p>\n\n<p>残差连接可以说是深度学习中最重要的基石。没有它，就没有100层的Transformer，没有现代LLM，没有scaling law。但基础性方案有一个特点：它们有时会变得太过隐形，以至于没人再去质疑它到底是最优解，还是仅仅是研究团队探索出的第一个能用的方案。</p>\n\n<p>打个比方，想象一个有特殊规则的传话游戏。在标准版本里，第1个人对第2个人耳语，第2个人再对第3个人耳语。到第18个人的时候，消息已经面目全非了。这就是没有残差连接的深层网络：每一层只能看到上一层的输出。</p>\n\n<p>残差连接修复了这个问题：每个人在传达自己的理解的同时，也把之前积累的原始信息原封不动地往下传。第3个人既能听到第2个人的新解读，也能听到之前的所有内容。原始信号始终被保留，它成为了不断壮大的合唱中的一个声部。</p>\n\n<p>但到了第152个人，你同时在听152个声音：原始信息加上151层叠加上去的内容，全部混在一句耳语里。理论上，前面那些人的声音依然存在，但它们已经被淹没了。如果第152个人需要知道第3个人具体说了什么，他得费力地从这首宏大的合唱声中把它挑出来。</p>\n\n<p>△</p>\n\n<p>消息累加的传话游戏中，靠后的人依然难以分辨出所需的内容</p>\n\n<p>通常而言，第152个人是做不到这一点的。</p>\n\n<p>这就是</p>\n\n<p>信息稀释</p>\n\n<p>。每一层都面临两难：倘若该层贡献新信息就可能会掩盖之前的内容，但保守不动则能保留之前层传过来的已有信息。这种状况下，很多层学会了保守不动，它们几乎不往残差流里写入任何东西。这样的深度网络在纸面上很深，实际上却很浅。研究团队堆了152层，但其中很多层却只学会了保持沉默。</p>\n\n<p>这里的瓶颈不在于152层网络所需求的算力，而在于信息穿过这些层的通信能力。CPU的发展在几十年前就撞过同样的墙：处理器越来越快，直到内存带宽跟不上了，逼得整个行业转向缓存和通信。组织管理也一样：一群聪明人所能发挥出的创造力，也受限于他们之间的沟通、组织方式。深度学习正在经历自己的版本：十年来不断增强每一层的能力，而层与层之间的通道始终是2015年那条单车道公路。</p>\n\n<p>那么，有没有更好的机制？</p>\n\n<p>配方</p>\n\n<p>在</p>\n\n<p>本文所介绍的研究之前</p>\n\n<p>已经有很多研究者注意到了深度瓶颈。多年来，修补方案越来越巧妙：获评CVPR best paper的DenseNet保留了每一层的输出，但代价是平方级的开销。使用可学习加权的方案DenseFormer、LIMe降低了成本，但训练完成后权重就固定了，每个token、每套上下文都用同样的权重。</p>\n\n<p>字节跳动的Hyper-Connections和DeepSeek的mHC另辟蹊径，它们把管道拓宽到N个通道，层间用混合矩阵连接，这相当于信息高速公路上同时多了好几条车道。但坏消息是，信息仍然在逐层流动，第152层没有办法直接回溯到第3层。</p>\n\n<p>彩云公司的MUDDFormer让混合每层输出这件事变成动态的，它会根据每个token的表征来生成权重。这在根本方向上是对的：从每一层汲取多少信息本就应该取决于你正在处理的内容。但同样有个坏消息，第152层在决定从第3层汲取多少时，只依赖第152层本身的状态，它并不知道第3层实际包含了什么。它是在</p>\n\n<p>预测</p>\n\n<p>哪些层有用，而不是在</p>\n\n<p>查看</p>\n\n<p>。</p>\n\n<p>以上的每一步都修复了一个真实存在的缺陷，但却鲜有哪一个方法质疑过深度残差的框架本身。</p>\n\n<p>不难发现，这些方法都有着一个共同点。从DenseNet到Hyper-Connections，每个方法都在回答同一个隐含的问题：“如何才能更好地</p>\n\n<p>混合</p>\n\n<p>各层的输出？”更好的系数，更多的通道，自适应的权重。但自始至终都是混合，自始至终都是累加。ELMo早就表明，不同的层编码的是截然不同的信息：浅层编码句法，深层编码语义。所有人得出的结论都是“学习更好的混合权重用来平衡</p>\n\n<p>句法</p>\n\n<p>和</p>\n\n<p>语义</p>\n\n<p>”。但还有一条被主流忽视的道路：如果不同层持有不同信息，也许每一层应该能够根据</p>\n\n<p>内容</p>\n\n<p>而非</p>\n\n<p>位置</p>\n\n<p>，从持有所需信息的那一层</p>\n\n<p>直接检索</p>\n\n<p>。</p>\n\n<p>这就是</p>\n\n<p>范畴谬误</p>\n\n<p>：把层间通信当作</p>\n\n<p>累加</p>\n\n<p>（用学习到的或生成的系数来组合信号）</p>\n\n<p>而非</p>\n\n<p>检索</p>\n\n<p>（通过基于内容的匹配来选择信息）</p>\n\n<p>。在累加框架下，即使是动态方法也只从当前层的状态生成混合权重，而不去查看信息的来源层实际包含了什么。在检索框架下，Query</p>\n\n<p>（查询）</p>\n\n<p>编码的是“我需要什么”，Key</p>\n\n<p>（键）</p>\n\n<p>编码的是“我有什么”，而它们之间的运算决定了相关性。Query和Key双方都应该有发言权。</p>\n\n<p>回到传话游戏。之前所有的方法都在试图产生一个更清晰的合唱：更好的发音、更多的中继通道、自适应的音量。没有一个质疑过这个根本约束：所有声音必须累加成一个声音吗？也没有人问过：咱是否可以直接走回去，跟之前的任何一个人当面对话呢？</p>\n\n<p>研究团队认为这种范畴谬误在架构设计中无处不在。当某个东西足够好用的时候，你不会去质疑它的概念框架，而只会在框架内改进。经历了多年越来越巧妙的修补之后，研究者才明白：深度维度的残差连接需要的不是更好的系数，而是被一种根本不同的操作所替代：</p>\n\n<p>一种在序列维度上已经成功解决了同样问题的操作。</p>\n\n<p>△</p>\n\n<p>因果注意力机制在序列维度（横向）上聚合信息</p>\n\n<p>下半场</p>\n\n<p>一旦研究团队把层间的通信理解为检索而非累加，一个很自然的答案就是在深度维度上引入注意力机制。包括研究者团队在内的很多团队都独立地收敛到了这个想法：谷歌提出的 DCA、华为的MRLA、Hessian.AI的 Dreamer、Kimi的AttnRes、以及研究者团队提出的Flash Depth Attention & MoDA，大家都尝试在层间应用点积注意力。这种独立趋同本身就是一个信号：方向走对了！</p>\n\n<p>△</p>\n\n<p>深度注意力机制在深度维度（纵向）上聚合信息</p>\n\n<p>但找对方向和做出成品是两回事。研究者自述：“第一次用Pytorch实现运行深度注意力的时候，前向和反向传播共计耗时达到了44,924 ms。44秒啊！朋友们！这个时间都够我喝完一瓶500毫升的冰红茶了！”</p>\n\n<p>也就是说，在深度维度上应用注意力机制的想法本身没问题，但工程现实却残酷到了极点。现代GPU为大规模的矩阵乘法做了大量优化，却不擅长数千个跨深度的极小规模的注意力操作。深度注意力作为一个计算量不大的算法，跑起来却可能慢得要命。</p>\n\n<p>△</p>\n\n<p>Pytorch实现的深度注意力（DepthRef）很慢；Flash Depth Attention（FDA）很快。</p>\n\n<p>至此，之前的方法都陷入了两难：要么简化深度注意力来换速度，这种方式丢掉了完整的选择性检索这一核心价值；要么保持完整的表达能力，但运算代价变得不可接受。研究者团队找到了一条出路：不是简化算法，而是重新组织参与计算的数据布局，从而适配GPU硬件。</p>\n\n<p>Flash Depth Attention</p>\n\n<p>（https://github.com/hustvl/MoDA）</p>\n\n<p>让具备完整表达能力的深度检索快到可以参与实际训练。</p>\n\n<p>△</p>\n\n<p>混合深度注意力</p>\n\n<p>机制同时在序列维度（横向）和深度维度（纵向）上聚合信息</p>\n\n<p>常规的大模型主干流水线是：残差连接</p>\n\n<p>→</p>\n\n<p>序列注意力</p>\n\n<p>→</p>\n\n<p>残差连接</p>\n\n<p>→</p>\n\n<p>FFN</p>\n\n<p>（前馈网络</p>\n\n<p>）</p>\n\n<p>。</p>\n\n<p>有了高效的深度检索之后，研究团队注意到网络的主干流水线变成了：深度注意力→序列注意力→深度注意力→FFN</p>\n\n<p>（前馈网络）</p>\n\n<p>。这三个连续的注意力操作作用于不同的Key</p>\n\n<p>（键，缩写作K）</p>\n\n<p>和Value</p>\n\n<p>（值，缩写作V）</p>\n\n<p>，却共享着近乎相同的Query</p>\n\n<p>（查询）</p>\n\n<p>。一个很自然的做法就是把它们融合。</p>\n\n<p>研究者团队提出了</p>\n\n<p>混合深度注意力</p>\n\n<p>（Mixture-of-depths Attention，MoDA）</p>\n\n<p>将深度检索和序列检索合并到一个统一的softmax中。每个注意力头同时关注当前层的序列KV对</p>\n\n<p>（键值对）</p>\n\n<p>和所有前序层的深度KV对</p>\n\n<p>（键值对）</p>\n\n<p>。在同一个softmax 下，模型可以自由决定何时关注序列中的其他token，何时跨层检索自身的历史信息。通过一次操作，MoDA完成了两个维度的检索。</p>\n\n<p>△</p>\n\n<p>左侧区域是序列KV，右侧区域是深度KV。颜色越黄，注意力越强。</p>\n\n<p>回到传话游戏。在残差连接的版本里，第152个人费力地从累加的合唱中辨认第3个人的声音。有了深度检索，第152个人拍拍第3个人的肩膀直接问：“你刚才说了什么？”没有中间人，没有累积的噪音。</p>\n\n<p>可视化的实验结果也印证了这个类比所预测的现象：当模型获得了通过深度KV从特定层进行选择性检索的能力时，它会持续且主动地使用这种能力。之前困扰模型架构研究员们的Attention Sink</p>\n\n<p>（注意力沉没）</p>\n\n<p>现象，即模型把概率质量堆积在少数固定token上的行为，也随之减弱。这就是当研究者团队尝试发展层</p>\n\n<p>之间</p>\n\n<p>而非仅仅层</p>\n\n<p>之内</p>\n\n<p>的信息流动时，所取得的有趣成果。</p>\n\n<p>△</p>\n\n<p>引入深度注意力后，传话游戏允许每个人用手机查看群聊记录。</p>\n\n<p>大模型架构的上半场是关于扩展组件的。</p>\n\n<p>研究者们扩展出更长的序列，更多的数据，更大的模型。这个阶段最关键的问题是“怎么把一切都做大？”。在上半场，这是正确且关键的问题，它把整个领域从GPT-2带到了GPT-4时代。</p>\n\n<p>下半场是关于扩展通信的</p>\n\n<p>。新的问题是：“</p>\n\n<p>组件之间的通信质量如何？</p>\n\n<p>”</p>\n\n<p>△</p>\n\n<p>引入</p>\n\n<p>混合深度注意力</p>\n\n<p>后，在主流的开源基线（OLMo2）上全面提升了模型能力。</p>\n\n<p>深度是最明显的例子，因为现有方案</p>\n\n<p>（累加）</p>\n\n<p>和可能的方案</p>\n\n<p>（选择性检索）</p>\n\n<p>之间的差距是巨大的。研究者团队相信这个原则是可以推广的。凡是神经网络使用静态的、与数据无关的通道来传递信息的地方，包括层与层之间、模态与模态之间、时间步与时间步之间等等，很可能都会有一个检索机制等着替代那个累加操作。</p>\n\n<p>全世界的研究者们花了十年掌握token之间如何对话，现在是时候掌握层与层之间如何对话了。而最终，研究者们将掌握神经网络中每个组件如何与其他任意组件对话。</p>\n\n<p>深度残差的“+”带我们跑过了一段极为精彩的旅程，但现在，是时候升级这座阶梯了。</p>\n\n<p>欢迎来到大模型架构的下半场。</p>\n\n<p>Flash Depth Attention & MoDA</p>\n\n<p>论文链接</p>\n\n<p>：</p>\n\n<p>https://arxiv.org/abs/2603.15619</p>\n\n<p>Flash Depth Attention & MoDA</p>\n\n<p>代码链接：</p>\n\n<p>https://github.com/hustvl/MoDA</p>\n\n<p>实验室主页：</p>\n\n<p>https://github.com/hustvl</p>\n\n<p>论文主要作者来自于华中科技大学（HUST）电子信息与通信学院视觉实验室（Vision Lab）。HUST Vision Lab研究主要集中在计算机视觉和深度学习领域，尤其关注以下方向：多模态基础模型、视觉表征学习、目标检测、分割与跟踪、端到端自动驾驶、新型神经网络架构。</p>\n\n<p>HUST Vision Lab致力于不断突破视觉智能的边界，代表性工作包括：CCNet（TPAMI 2020，4300+引用，1.5K Star）、Mask Scoring R-CNN（CVPR 2019，1400+引用，1.9K Star）、FairMOT（IJCV 2021，2200+引用，4.2K Star）、ByteTrack（ECCV 2022，3400+引用，6.2K Star）、EVA（CVPR 2023，1100+引用，2.7K Star）、MapTR（ICLR 2023，400+引用，1.5K Star）、Vectorized Autonomous Driving (VAD)（ICCV 2023，600+引用，1.3K Star）、DiffusionDrive（CVPR 2025，200+引用，1.3K Star）、Vision Mamba (Vim)（ICML 2024，3100+引用，3.8K Star）、4D Gaussian Splatting (4DGS)（CVPR 2024，1400+引用，3.5K Star）、YOLOS（NeurIPS 2021，500+引用，900+ Star）、YOLO-World（CVPR 2024，1000+引用，6.3K Star），以及 LightningDiT & VA-VAE（CVPR 2025，200+引用，1.4K Star）。</p>\n\n<p>一键三连</p>\n\n<p>「点赞」「转发」「小心心」</p>\n\n<p>欢迎在评论区留下你的想法！</p>\n\n<p>—</p>\n\n<p>完</p>\n\n<p>—</p>\n\n<p>我们正在招聘一名眼疾手快、关注AI的</p>\n\n<p>学术编辑实习生</p>\n\n<p>🎓</p>\n\n<p>感兴趣的小伙伴欢迎关注 👉</p>\n\n<p>了解详情</p>\n\n<p>🌟 点亮星标 🌟</p>\n\n<p>科技前沿进展每日见</p>"}, {"title": "新一代记忆智能体框架MIA：让智能体告别「失忆式工作」，在持续进化中变强", "source": "机器之心", "link": "https://mp.weixin.qq.com/s/Ps0y3Q9Du9O_v95hhyk8NQ", "html": "<p>本文共同一作是上海创智学院博士生乔静阳、孟炜程，通讯作者是华东师范大学张志忠副教授，项目主导人是国家优青谢源教授。</p>\n\n<p>Never memorize something that you can look up.</p>\n\n<p>— Albert Einstein</p>\n\n<p>如今的大多数智能体，仍然活在一种「失忆式工作」模式中：每一次检索都是从零开始，每一条推理路径都无法沉淀，每一次失败也不会转化为经验。它们虽能多轮交互，但很难在深度研究中持续变强。</p>\n\n<p>为了解决这个问题，已有工作尝试基于历史方案生成执行规划，但受限于预训练范式，许多智能体仍陷入新的困境：一个不擅长规划的「决策器」，从臃肿的记忆中检索出零散片段，再去驱动一个缺乏规划执行能力的「执行器」。结果是：记忆在增长，智能却没有。</p>\n\n<p>于是，浮现出一个关键问题：</p>\n\n<p>是否存在将经验转化为能力的智能体记忆机制？</p>\n\n<p>上海创智学院和华东师范大学联合团队最近提出的 Memory Intelligence Agent (MIA)，</p>\n\n<p>一个面向深度研究场景的新一代记忆智能体框架，给这一问题带来了新的答案。</p>\n\n<p>论文地址：https://arxiv.org/abs/2604.04503</p>\n\n<p>代码仓库：https://github.com/ECNU-SII/MIA</p>\n\n<p>龙虾技能：</p>\n\n<p>纯净版：</p>\n\n<p>https://clawhub.ai/jingyangqiao/mia</p>\n\n<p>可信版：https://clawhub.ai/sii-yucheng2002/mia-trust</p>\n\n<p>（高效版和可训练版即将发布）</p>\n\n<p>为了解决这一问题，MIA 构建了一套基于「Planner–Executor–Manager」架构的记忆系统。其中，Planner 是战术大脑，不仅能够针对当前问题制定研究计划，还能通过测试时的持续学习实时调整其策略。Executor 是经过训练的执行专家，能够毫无阻碍地解读并遵循复杂的研究蓝图。Manager 是终极管理员，优化记忆存储以消除冗余。</p>\n\n<p>与现有方法相比，MIA 的核心亮点在于：</p>\n\n<p>构建双记忆机制，</p>\n\n<p>非参数记忆负责沉淀经验，参数记忆负责吸收能力，二者相互转化，形成持续进化的闭环；</p>\n\n<p>提出 Manager–Planner–Executor 多智能体结构，</p>\n\n<p>将记忆管理、策略规划与任务执行解耦，并通过交替强化学习驱动 Planner 与 Executor 的协同进化，将「会规划」和「会执行」对齐；</p>\n\n<p>引入面向开放世界的自进化机制，</p>\n\n<p>结合反思与无监督学习，让智能体在开放世界的推理过程中持续修正策略、动态更新记忆，实现边做边学的在线进化。</p>\n\n<p>在 X 平台上，该论文已被 DAIR.AI 的创始人，拥有 30 万粉丝的 AI 论文分享博主 Elvis Saravia 所转发，并收获了高度评价与大量关注。与此同时，该论文也入选了 Hugging Face Daily Papers 榜单。</p>\n\n<p>从「逐次推理」到「可积累的研究闭环」</p>\n\n<p>作为一个持续运行的 Planning–Execution–Memory 闭环系统，MIA 在每一次研究任务中，都会经历：经验调用 → 协同推理 → 经验沉淀，并不断反哺后续决策。</p>\n\n<p>在经验调用中，MIA 通过三维检索机制调用历史经验，分别是</p>\n\n<p>保证相关性的语义相似度，高质量经验偏好的价值奖励和激活长尾知识的频率奖励。</p>\n\n<p>此外，作者还引入失败轨迹作为约束，使记忆既能提供参考，又能避免重复错误。在协同推理中，MIA 将推理解耦为两个智能体的协作过程，Planner 负责拆解任务、生成步骤，而 Executor 负责按照步骤执行。二者通过 Reflect–Replan 形成反馈闭环，当执行受阻时自动重规划，让智能体具备持续试错与调整能力。</p>\n\n<p>在经验沉淀中，MIA 将对两种记忆同时更新。首先对轨迹进行压缩与提取，形成结构化非参数记忆。其次在线更新 Planner 参数，将经验转化为参数记忆。最后实现从经验存储到能力内化的跃迁。</p>\n\n<p>让「会规划」和「会执行」学会配合</p>\n\n<p>在传统记忆系统中，Planner 和 Executor 往往只是拼在一起，并没有真正学会协作。为此，MIA 提出了一套两阶段交替强化学习和测试时持续学习的进化机制，让两个模块逐步对齐，并在真实任务中不断变强。首先在两阶段交替强化学习中，MIA 将训练过程拆分为：</p>\n\n<p>阶段一：</p>\n\n<p>固定 Planner，让 Executor 学会理解并严格执行规划；</p>\n\n<p>阶段二：</p>\n\n<p>固定 Executor，让 Planner 学习如何利用记忆生成更优计划与计划执行失败时的反思与重规划能力。</p>\n\n<p>这种「先对齐执行，再优化决策」的方式，解决了「规划很好，但执行跟不上」的问题。</p>\n\n<p>其次不同于传统方法「训练完即冻结」，MIA 在推理阶段引入测试时学习，赋能智能体持续进化。其过程包括：执行推理任务同时生成多条候选路径。从成功与失败路径中提取非参数化记忆，基于成功路径在线更新参数化记忆。推理与训练几乎同步完成，形成真正的在线学习闭环。</p>\n\n<p>让智能体在开放世界中稳定进化</p>\n\n<p>为了将 MIA 能够真正用在开放环境的深度研究中，作者提出了一套无监督的自进化评估机制，让智能体在没有外部反馈的条件下，也能持续优化自身能力。</p>\n\n<p>其核心思路是：</p>\n\n<p>用「过程质量」替代「结果标签」，只要推理严谨、证据可靠、结论合理，即使没有标准答案，也可以作为有效学习信号。</p>\n\n<p>因此，受学术评审的启发，作者将对结果的判断拆成多个「专家视角」，包括：</p>\n\n<p>逻辑评审员：</p>\n\n<p>检查推理链条是否自洽</p>\n\n<p>事实评审员：</p>\n\n<p>验证信息来源以及是否存在幻觉</p>\n\n<p>结果评审员：</p>\n\n<p>评估任务是否真正完成</p>\n\n<p>最终由一个「领域主席」进行综合决策并给出整体判断，为 MIA 提供稳定的优化信号，进而助力实时进化。</p>\n\n<p>实验结论</p>\n\n<p>在多项文本与多模态深度研究任务中，MIA 显著提升了智能体的稳定性与效率：</p>\n\n<p>SOTA 性能再突破 (a & b)：</p>\n\n<p>在 LiveVQA (多模态在线搜索) 与 HotpotQA (纯文本沙盒搜索) 的对比实验中，MIA 显著提升了现有最先进 LLMs（GPT-5.4, Gemini-3-Flash, claude-sonnet-4.6）在调用搜索工具下的表现；</p>\n\n<p>实现小尺寸模型的跨级超越 (c)：</p>\n\n<p>基于 Qwen-2.5-VL-7B 执行器的 MIA 模型在 7 个核心数据集上表现卓越，超越了在不调用工具下的 GPT-5.4，GPT-4o 和 Gemini-2.5-Pro，逼近了 Gemini-3-Flash；</p>\n\n<p>记忆方法的新标杆 (d)：</p>\n\n<p>在与当前先进智能体记忆方法的横向评测中，MIA 在 7 个数据集上均取得最佳性能表现。</p>\n\n<p>总结</p>\n\n<p>智能体记忆不应该只是让智能体记住了「结果是什么」，而是应该让它学会「该怎么做」。MIA 的出现，传递了一个清晰的信号：</p>\n\n<p>决定一个智能体上限的，不再仅仅是它接入了多少外部工具，而是它能否在每一次与世界的交互中，将繁杂的「过程信息」压缩为精炼的「执行本能」。</p>\n\n<p>© THE END</p>\n\n<p>转载请联系本公众号获得授权</p>\n\n<p>投稿或寻求报道：liyazhou@jiqizhixin.com</p>"}, {"title": "更新越频繁，Claude Code与Codex越像", "source": "机器之心", "link": "https://mp.weixin.qq.com/s/0h2fAdCdwI3kxt3oYV80LQ", "html": "<p>机器之心编辑部</p>\n\n<p>前几天，</p>\n\n<p>OpenAI 正式发布了全新的大模型 GPT-5.4-Cyber</p>\n\n<p>。和很多网友的感受一样，这个模型也给我们带来了一种极其强烈的既视感。</p>\n\n<p>这款新模型在目标用户群、应用场景甚至宣发策略上，几乎完全对标了</p>\n\n<p>Anthropic 前些天发布的 Claude Mythos</p>\n\n<p>。这种「贴身肉搏」的态势已经到了毫不掩饰的地步。就连《纽约时报》都在最新的报道标题中一针见血地指出：「与 Anthropic 一样，OpenAI……」。</p>\n\n<p>这种同质化的趋势绝不仅仅停留在最底层的基座模型上。如果你把目光投向这两家公司近期发布的一系列产品，你会发现它们正在成为彼此的镜像！</p>\n\n<p>在资本市场的无影灯下，这种趋同更加明显。目前两家公司在二级市场上的估值咬得非常紧，Anthropic 甚至在近期凭借其在企业级市场的狂飙突进，价格略高于 OpenAI。资本的嗅觉最为灵敏，在他们眼中，这两只独角兽正在长出相同的犄角。</p>\n\n<p>看起来，底层大模型的同质化必然会导致上层应用的趋同。</p>\n\n<p>今天，我想和大家探讨的，正是代表着当今 AI 辅助编程最高水平的两个标杆工具： OpenAI 的</p>\n\n<p>Codex</p>\n\n<p>和 Anthropic 的</p>\n\n<p>Cl</p>\n\n<p>au</p>\n\n<p>de Code</p>\n\n<p>。从曾经的分道扬镳，到如今的殊途同归，它们是如何一步步长成了同一副模样的？</p>\n\n<p>从分道扬镳到殊途同归：双雄的演进史</p>\n\n<p>把时间拨回几年以前，Codex 和 Claude Code 完全是两种不同技术哲学的产物。</p>\n\n<p>Codex 的底层逻辑是「天下武功唯快不破」。它就像是一个跟在你身后、随时准备补全代码的 5 年经验高级开发。</p>\n\n<p>在 OpenAI 的构想中，Codex 是一个轻量级、高互动的终端智能体，它主打快速迭代和交互式编程。它的执行速度极快，在 Cerebras WSE-3 硬件的加持下，能够达到每秒 1000 个 token 的吞吐量。在具体的工作流中，Codex 提供建议、自动编辑和全自动三种明确的审批模式，让开发者始终保持在循环之内。这种设计思路非常符合那些需要快速构建原型、处理高频交互的极客开发者。</p>\n\n<p>反观 Claude Code，它从诞生之初就自带一种高冷且克制的「架构师」属性。</p>\n\n<p>Anthropic 为它注入了处理极端复杂任务的基因。它依赖高达 100 万 token 的庞大上下文窗口，以及独特的「压缩」技术来实现无限对话。Claude Code 的信条是「全局掌控，谋定而后动」。在执行任何动作之前，它会先使用智能体搜索技术吃透整个代码库的脉络，然后协调多文件进行一致性修改。对于那些涉及数万行代码迁移的企业级重构任务，Claude Code 展现出了惊人的统治力。</p>\n\n<p>然而，随着时间的推移以及应用场景的不断下探，这两个原本性格迥异的工具，开始互相抄作业。</p>\n\n<p>图源：MorphLLM</p>\n\n<p>在处理复杂项目时，单体 AI 模型面临的最大瓶颈就是上下文污染。你让 AI 重构鉴权模块，它读了 40 个文件之后，往往就忘记了第一个文件的设计模式。为了解决这个痛点，两家公司给出了几乎一模一样的答案：为每个子任务分配独立的上下文窗口。</p>\n\n<p>OpenAI 很快推出了全新的 macOS 桌面端应用，将任务按项目隔离在不同的线程中，并在云端沙盒里独立运行。Anthropic 则推出了智能体团队架构，允许开发者派生出多个子智能体，它们共享任务列表和依赖关系，并在各自的独立窗口中并行工作。你会发现，无论是叫「云端沙盒」还是叫「智能体团队」，它们在工程实现上的核心理念已经完全重合。</p>\n\n<p>在基准测试的成绩单上，它们也呈现出一种微妙的平衡。GPT-5.3-Codex 在终端任务 Terminal-Bench 2.0 中以 77.3% 的得分领先。Claude Code 则在复杂的 SWE-bench Verified 榜单上拿下了 80.8% 的成绩。它们都在自己的优势区间里做到了极致，同时又在拼命弥补自身的短板。</p>\n\n<p>OpenClaw 效应：推倒高墙的无形之手</p>\n\n<p>如果说两家公司的内部战略决定了它们走向同质化的内因，那么整个开源生态的倒逼则是不可忽视的外力。在这里，我们必须要提到 OpenClaw 给整个 AI 编程工具赛道带来的深远影响。</p>\n\n<p>作为开源社区推出的工作流框架，OpenClaw 的出现可以说是推倒了巨头们辛苦建立的生态高墙。它将大模型与本地终端工具链的交互过程进行了标准化。过去，如何让大模型优雅地调用本地 Git 提交、如何安全地在沙盒中运行测试脚本、如何进行多步推理验证，这些都是 Codex 和 Claude Code 各自引以为傲的专有「黑科技」。</p>\n\n<p>但 OpenClaw 将这些流程抽象成了通用的协议。这意味着，开发者不再需要为了某一种特定的协同模式而被绑定在特定的平台上。开源社区的狂欢让标准化成为了不可逆转的洪流。面对这种情况，无论是 OpenAI 还是 Anthropic，都不得不放低姿态去兼容这种开放的标准。</p>\n\n<p>当底层的技术壁垒被 OpenClaw 这种开源力量拉平，当所有的高级特性都成为了行业的标准配置，Codex 和 Claude Code 唯一的出路，就是在更细微的用户体验层面进行无止境的内卷。这也是为什么我们会觉得它们越来越像，因为在标准化的框架下，最优解往往只有一个 —— 就像是生物的趋同演化。</p>\n\n<p>Codex 正在追赶 Claude Code</p>\n\n<p>虽然 Claude Code 与 Codex 正在趋同演化的道路上，但两者的差异依然存在，甚至 Codex 在某些方面已经更受开发者青睐。</p>\n\n<p>前两天，在 r/ClaudeCode 社区，一位拥有 14 年经验、曾在科技巨头工作的高级工程师 u/Canamerican726 分享了一份极其硬核的测评。</p>\n\n<p>具体而言，他在一个包含 8 万行代码的复杂项目中，分别投入 100 小时使用 Claude Code 和 20 小时使用 Codex。</p>\n\n<p>在他的视角里，使用 Claude Code 就像在指导一个被截止日期追赶的工程师，它冲刺速度极快，却经常会无视开发者在 CLAUDE.md 中写下的规范，并且喜欢在现有文件里不断堆砌代码来完成任务，缺乏重构思维。</p>\n\n<p>相比之下， Codex 给他的感觉更像是一个拥有 5 到 6 年经验的沉稳老手。它的处理速度虽然要慢上 3 到 4 倍，但会在中途主动停下来思考并重构代码，并且严格遵守指令边界。这种高度的自主性，让这位工程师敢于把任务直接扔给它，然后放心地去做其他事情。</p>\n\n<p>同样的声音也出现在 X 等社交网络上。研究员 Aran Komatsuzaki 结合自己的使用体验提到，在前端领域 Claude Code 依然占优，但在后端规划和保持信息更新方面，高频调用网络搜索的 Codex 显然更加扎实。</p>\n\n<p>评论区里充满了真实业务场景下的血泪总结。有开发者极其犀利地指出，基于 Opus 的模型虽然跑得快，但往往会给项目积攒下大量的「代码清洁债务」，Codex 动作慢，却能在前行的同时顺手把地扫干净。我甚至看到有用户总结出了一条生存法则，建议大家在上下文窗口的使用率达到 70% 时立刻开启新会话，否则极其容易收到系统附赠的隐蔽 bug。</p>\n\n<p>这些来自一线的真实吐槽清晰地表明，当两大神器的能力面板越来越重合时，决定开发者最终阵营归属的，往往就是这些关乎「填坑成本」和「维护心智」的微小体验差距，当然对于中国用户还有一些特殊的困难，比如：</p>\n\n<p>冷思考：同质化背后的生态暗战</p>\n\n<p>当然，Codex 和 Claude Code 和优劣还在于各位开发者自己，也要看开发者自身的能力，正如上述 u/Canamerican726 的评测报告总结的那样：如果你不懂软件工程，这两个工具都会输出糟糕的结果，工具并不等同于技能。</p>\n\n<p>这句话戳破了 AI 编程工具长期以来营造的某种幻觉。我们曾经以为，只要有足够强大的 AI 助手，哪怕是没有任何基础的 Vobe Coder 也能单枪匹马打造出企业级应用。但现实是，Claude Code 需要一个极其专注且技能过硬的「驾驶员」，否则它很容易在庞大的代码库中迷失方向。Codex 虽然更加独立，但它同样需要开发者提供精准的系统上下文才能发挥最大效用。</p>\n\n<p>那么，在工具能力高度同质化的今天，这两家公司的护城河究竟转移到了哪里？</p>\n\n<p>答案藏在那些枯燥的财务报表和定价策略里。在相同的任务下，Claude Code 消耗的 token 数量往往是 Codex 的 3 到 4 倍。使用成本更高。对于企业团队来说，使用 Claude Code 每个月需要为每位开发者支付 100 到 200 美元的费用。而 Codex 则将其能力打包进了价格更为亲民的订阅计划中，并且通过庞大的 GitHub 社区积攒了大量基础用户。</p>\n\n<p>图源：MorphLLM</p>\n\n<p>Anthropic 的野心在于将 Claude Code 深度嵌入到那些不缺钱的科技巨头的工作流中。比如 Stripe 就让 1370 名工程师使用 Claude Code，在 4 天内完成了一项原本需要 10 个人工作数周的跨语言代码迁移。Ramp 公司更是依靠它将事件响应时间缩短了 80%。OpenAI 则依靠其无孔不入的生态渗透率，让 Codex 成为了许多普通开发者的默认选择。</p>\n\n<p>这不再是一场单纯的技术竞赛，而是一场关于生态绑定、定价策略以及用户习惯重塑的消耗战。</p>\n\n<p>开发者的十字路口</p>\n\n<p>回望这一年来的技术演进，GPT-5.4-Cyber 的发布只是这场漫长战役中的一个微小注脚。Codex 和 Claude Code 正在走向「同一张面孔」，标志着 AI 编程工具从早期充满变数和猎奇色彩的测试阶段，正式迈入了成熟且乏味的工业化生产阶段。</p>\n\n<p>现在，Claude Code 每天会自动生成 13.5 万次 GitHub 提交，这个数字已经占到了全网公开提交量的 4%。我们可以预见，在不久的将来，大部分的样板代码、基础测试用例以及常规的代码重构，都会由这些长得越来越像的 AI 智能体在后台默默完成。</p>\n\n<p>图源：MorphLLM & SemiAnalysis / GitHub Search API</p>\n\n<p>面对两个在能力上无限趋近、在体验上相互模仿的超级工具，我们作为人类开发者的核心价值还剩下什么？或许，工具红利期即将彻底结束。当每个人手中都握着同样锋利的武器时，真正决定胜负的，将不再是谁拥有更好的代码补全速度，而是谁能更好地定义问题、谁拥有更宏大的系统架构视野，以及谁能在这个被 AI 填满的代码世界里，找到那份属于人类独有的不可替代性。</p>\n\n<p>话说回来，你选哪个？</p>\n\n<p>参考链接</p>\n\n<p>https://www.morphllm.com/comparisons/codex-vs-claude-code</p>\n\n<p>https://www.reddit.com/r/ClaudeCode/comments/1sk7e2k/claude_code_100_hours_vs_codex_20_hours/</p>\n\n<p>https://x.com/arankomatsuzaki/status/2044270102003196007</p>\n\n<p>https://www.nytimes.com/2026/04/14/technology/openai-cybersecurity-gpt54-cyber.html</p>\n\n<p>© THE END</p>\n\n<p>转载请联系本公众号获得授权</p>\n\n<p>投稿或寻求报道：liyazhou@jiqizhixin.com</p>"}];

const sectionMap = {
  '新智元': '国际', '机器之心': '国际', '量子位': '国际', 'InfoQ': '国际',
  '银行科技研究社': '同业', '中国金融电脑': '同业', '财联社AI daily': '同业',
  '腾讯CodeBuddy': '同业', '腾讯技术工程': '同业'
};
const sectionIcon = { '国际': '🌍', '国内': '🇨🇳', '同业': '🏦' };

function showArticle(idx) {
  document.getElementById('page-home').classList.add('hidden');
  document.getElementById('page-article').classList.remove('hidden');
  const a = ARTICLES[idx];
  const linkHtml = a.link
    ? '<div class="original-btn"><a href="' + a.link + '" target="_blank">🔗 阅读原文（微信）</a></div>'
    : '';
  document.getElementById('articleBody').innerHTML =
    '<h1>' + a.title + '</h1>' +
    '<div class="meta">来源：' + a.source + '</div>' +
    a.html + linkHtml;
  window.scrollTo(0, 0);
}

function showHome() {
  document.getElementById('page-article').classList.add('hidden');
  document.getElementById('page-home').classList.remove('hidden');
}

function renderArticles(filter) {
  const container = document.getElementById('articleContainer');
  container.innerHTML = '';
  const lower = filter.toLowerCase();
  const sections = { '国际': [], '国内': [], '同业': [] };
  let hasResult = false;
  ARTICLES.forEach((a, i) => {
    const match = !lower || a.title.toLowerCase().includes(lower) || a.source.toLowerCase().includes(lower);
    if (!match) return;
    hasResult = true;
    const sec = sectionMap[a.source] || '国内';
    sections[sec].push([i, a]);
  });
  if (!hasResult) {
    container.innerHTML = '<div class="no-result">没有找到相关文章</div>';
    return;
  }
  [['国际', '🌍 国际视野'], ['国内', '🇨🇳 国内动态'], ['同业', '🏦 同业观察']].forEach(([sec, label]) => {
    const items = sections[sec];
    if (!items.length) return;
    const cards = items.map(([i, a]) =>
      '<div class="article-card" onclick="showArticle(' + i + ')">' +
      '<div class="title">' + a.title + '</div>' +
      '<div class="meta"><span class="source-tag">' + a.source + '</span></div>' +
      '</div>'
    ).join('');
    container.innerHTML +=
      '<div class="section">' +
      '<div class="section-title">' + label + '</div>' +
      '<div class="article-list">' + cards + '</div>' +
      '</div>';
  });
}

document.getElementById('searchInput').addEventListener('input', e => renderArticles(e.target.value));
renderArticles('');
</script>
</body>
</html>
