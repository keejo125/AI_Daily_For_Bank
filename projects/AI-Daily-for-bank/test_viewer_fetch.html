<!DOCTYPE html>
<html>
<body>
<h2>Viewer Fetch Test</h2>
<pre id="log"></pre>
<script>
var log = document.getElementById('log');
var params = new URLSearchParams(window.location.search);
var filePath = params.get('file');
log.textContent += 'filePath: ' + filePath + '\n';
log.textContent += 'location: ' + window.location.href + '\n';

if (filePath) {
  fetch(filePath)
    .then(function(r) {
      log.textContent += 'status: ' + r.status + '\n';
      log.textContent += 'ok: ' + r.ok + '\n';
      return r.text();
    })
    .then(function(t) {
      log.textContent += 'content length: ' + t.length + '\n';
      log.textContent += 'first 200: ' + t.substring(0, 200) + '\n';
    })
    .catch(function(e) {
      log.textContent += 'ERROR: ' + e.message + '\n';
    });
}
</script>
</body>
</html>
