<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-Daily for Bank · 智能研发早报</title>
<style>
  :root {
    --bg-body: #f1f5f9;
    --bg-card: #ffffff;
    --bg-card-hover: #f8fafc;
    --bg-hero: linear-gradient(135deg, #ffffff 0%, #f0f9ff 40%, #e0f2fe 100%);
    --bg-input: #f1f5f9;
    --bg-input-focus: #ffffff;
    --text-primary: #1f2937;
    --text-secondary: #4b5563;
    --text-muted: #9ca3af;
    --text-on-dark: #1f2937;
    --text-on-dark-soft: #3b82f6;
    --border-color: #e2e8f0;
    --border-input: #cbd5e1;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --intl: #3b82f6;
    --intl-bg: #dbeafe;
    --domestic: #10b981;
    --domestic-bg: #d1fae5;
    --industry: #f59e0b;
    --industry-bg: #fef3c7;
    --other: #8b5cf6;
    --other-bg: #ede9fe;
    --cta-bg: #3b82f6;
    --cta-bg-hover: #2563eb;
    --highlight-bg: #fef08a;
    --highlight-text: #854d0e;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-body: #0b1120;
      --bg-card: #1a2332;
      --bg-card-hover: #212d40;
      --bg-hero: linear-gradient(135deg, #0a1628 0%, #122a4e 50%, #1e40af 100%);
      --bg-input: #1a2332;
      --bg-input-focus: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --text-on-dark: #f8fafc;
      --text-on-dark-soft: #93c5fd;
      --border-color: #2a3a50;
      --border-input: #334155;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.25);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.4);
      --intl-bg: rgba(59,130,246,0.18);
      --domestic-bg: rgba(16,185,129,0.18);
      --industry-bg: rgba(245,158,11,0.18);
      --other-bg: rgba(139,92,246,0.18);
      --cta-bg: #3b82f6;
      --cta-bg-hover: #2563eb;
      --highlight-bg: rgba(250,204,21,0.25);
      --highlight-text: #fde047;
    }
    .latest-card .date-col {
      background: linear-gradient(180deg, #0f2847, #1a4a7a);
    }
    .tag-empty { opacity: 0.3; }
    .stat-empty { opacity: 0.25; }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg-body);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background 0.3s, color 0.3s;
  }

  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* ===== Hero ===== */
  .hero {
    background: var(--bg-hero);
    color: var(--text-on-dark);
    border-radius: var(--radius-xl);
    padding: 48px 32px 36px;
    margin-bottom: 28px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    top: -80px;
    right: -80px;
    width: 260px;
    height: 260px;
    background: rgba(59,130,246,0.06);
    border-radius: 50%;
  }
  .hero::after {
    content: "";
    position: absolute;
    bottom: -60px;
    left: -60px;
    width: 200px;
    height: 200px;
    background: rgba(59,130,246,0.04);
    border-radius: 50%;
  }
  .hero h1 {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
    position: relative;
  }
  .hero .subtitle {
    font-size: 15px;
    color: var(--text-on-dark-soft);
    margin-bottom: 24px;
    position: relative;
  }

  /* ===== Search ===== */
  .search-wrapper {
    position: relative;
    max-width: 560px;
    margin: 0 auto;
  }
  .search-wrapper .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    color: var(--text-muted);
    pointer-events: none;
    z-index: 1;
  }
  .search-input {
    width: 100%;
    height: 52px;
    border: 2px solid rgba(59,130,246,0.15);
    border-radius: 28px;
    padding: 0 48px 0 50px;
    font-size: 16px;
    font-family: inherit;
    background: rgba(255,255,255,0.7);
    color: var(--text-primary);
    outline: none;
    transition: all 0.25s;
    backdrop-filter: blur(8px);
  }
  .search-input::placeholder {
    color: rgba(100,116,139,0.55);
  }
  .search-input:focus {
    background: #ffffff;
    border-color: rgba(59,130,246,0.3);
    box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
  }
  .search-clear {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border: none;
    background: rgba(148,163,184,0.15);
    color: var(--text-muted);
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.2s;
  }
  .search-clear:hover { background: rgba(148,163,184,0.25); }
  .search-clear.visible { display: flex; }

  /* ===== Section Title ===== */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-color);
    transition: border-color 0.3s;
  }

  /* ===== Latest Card ===== */
  .latest { margin-bottom: 32px; }
  .latest-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    overflow: hidden;
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border-color);
    transition: box-shadow 0.25s, transform 0.2s, background 0.3s, border-color 0.3s;
    text-decoration: none;
    color: inherit;
  }
  .latest-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }
  .latest-card .date-col {
    background: linear-gradient(180deg, #3b82f6, #2563eb);
    color: #fff;
    padding: 28px 24px;
    text-align: center;
    min-width: 110px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex-shrink: 0;
  }
  .latest-card .date-col .month { font-size: 13px; opacity: 0.75; font-weight: 500; }
  .latest-card .date-col .day { font-size: 44px; font-weight: 800; line-height: 1; margin: 4px 0; }
  .latest-card .date-col .weekday { font-size: 13px; opacity: 0.65; }
  .latest-card .info {
    padding: 24px 28px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }
  .latest-card .info .summary {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 16px;
    line-height: 1.7;
    transition: color 0.3s;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .latest-card .info .tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .latest-card .info .tag {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
    transition: transform 0.15s;
  }
  .latest-card .info .tag:hover { transform: scale(1.05); }
  .tag-intl { background: var(--intl-bg); color: var(--intl); }
  .tag-domestic { background: var(--domestic-bg); color: var(--domestic); }
  .tag-industry { background: var(--industry-bg); color: var(--industry); }
  .tag-other { background: var(--other-bg); color: var(--other); }
  .tag-empty { opacity: 0.4; }
  .stat-empty { opacity: 0.35; }
  .latest-card .cta {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    border-left: 1px solid var(--border-color);
    flex-shrink: 0;
    transition: border-color 0.3s;
  }
  .latest-card .cta a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--cta-bg);
    color: #fff;
    padding: 10px 22px;
    border-radius: var(--radius-sm);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    transition: background 0.2s, transform 0.15s;
  }
  .latest-card .cta a:hover { background: var(--cta-bg-hover); transform: scale(1.03); }

  /* ===== History List ===== */
  .history { margin-bottom: 32px; }
  .day-list { display: flex; flex-direction: column; gap: 10px; }
  .day-item {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-sm);
    text-decoration: none;
    color: inherit;
    border: 1px solid var(--border-color);
    transition: box-shadow 0.2s, transform 0.15s, background 0.3s, border-color 0.3s;
  }
  .day-item:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
    background: var(--bg-card-hover);
  }
  .day-item:active { transform: translateY(0); }
  .day-item .left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
  .day-item .date-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 56px;
    flex-shrink: 0;
  }
  .day-item .date-block .day-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
    transition: color 0.3s;
  }
  .day-item .date-block .day-month {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .day-item .meta { flex: 1; min-width: 0; }
  .day-item .meta .date-full {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    transition: color 0.3s;
  }
  .day-item .meta .date-full .weekday-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-left: 6px;
  }
  .day-item .meta .stats-row {
    display: flex;
    gap: 10px;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .day-item .meta .stats-row .stat {
    font-size: 12px;
    color: var(--text-secondary);
    transition: color 0.3s;
  }
  .day-item .meta .stats-row .stat .stat-num {
    font-weight: 700;
  }
  .day-item .meta .stats-row .stat.total {
    color: var(--text-muted);
  }
  .day-item .arrow {
    color: var(--text-muted);
    font-size: 18px;
    flex-shrink: 0;
    margin-left: 10px;
    transition: color 0.2s, transform 0.2s;
  }
  .day-item:hover .arrow {
    color: var(--cta-bg);
    transform: translateX(3px);
  }

  /* ===== Search Results ===== */
  .search-results { margin-bottom: 32px; }
  .search-results-count {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
    font-weight: 500;
  }
  .search-result-list { display: flex; flex-direction: column; gap: 10px; }
  .search-result-item {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 18px 22px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-color);
    transition: box-shadow 0.2s, transform 0.15s, background 0.3s, border-color 0.3s;
  }
  .search-result-item:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .search-result-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }
  .search-result-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    text-decoration: none;
    flex: 1;
    min-width: 0;
    line-height: 1.5;
    transition: color 0.2s;
  }
  .search-result-title:hover { color: var(--cta-bg); }
  .search-result-date {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .search-result-digest {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .search-result-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .search-result-source {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    text-decoration: none;
    white-space: nowrap;
    transition: transform 0.15s, opacity 0.2s;
  }
  .search-result-source:hover { transform: scale(1.04); opacity: 0.85; }
  .search-result-original {
    font-size: 12px;
    color: var(--cta-bg);
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .search-result-original:hover { opacity: 0.7; }
  .search-result-cat {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  /* highlight */
  mark.search-hl {
    background: var(--highlight-bg);
    color: var(--highlight-text);
    padding: 1px 2px;
    border-radius: 3px;
    font-weight: 600;
  }

  /* ===== No Results ===== */
  .no-results {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
  }
  .no-results .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .no-results .text { font-size: 15px; }

  /* ===== Footer ===== */
  .footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    padding: 20px 16px 0;
  }

  /* ===== Loading ===== */
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

  /* ===== Responsive ===== */
  @media (max-width: 767px) {
    .container { padding: 12px 12px 32px; }
    .hero { padding: 36px 20px 28px; border-radius: var(--radius-lg); }
    .hero h1 { font-size: 24px; }
    .hero .subtitle { font-size: 13px; margin-bottom: 20px; }
    .search-input { height: 46px; font-size: 15px; padding-left: 44px; padding-right: 44px; }
    .search-wrapper .search-icon { left: 15px; width: 18px; height: 18px; }

    .latest-card { flex-direction: column; }
    .latest-card .date-col {
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 18px;
      min-width: auto;
    }
    .latest-card .date-col .day { font-size: 28px; }
    .latest-card .info { padding: 18px 20px; }
    .latest-card .info .summary { font-size: 13px; }
    .latest-card .cta {
      border-left: none;
      border-top: 1px solid var(--border-color);
      padding: 14px 20px;
    }
    .latest-card .cta a { width: 100%; justify-content: center; }

    .day-item { padding: 12px 14px; }
    .day-item .left { gap: 10px; }
    .day-item .date-block { min-width: 46px; }
    .day-item .date-block .day-num { font-size: 18px; }

    .search-result-item { padding: 14px 16px; }
    .search-result-title { font-size: 14px; }
  }

  @media (min-width: 768px) and (max-width: 1023px) {
    .container { max-width: 720px; }
  }

  @media (min-width: 1024px) {
    .container { max-width: 920px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Hero -->
  <div class="hero">
    <h1>AI-Daily for Bank</h1>
    <p class="subtitle">智能研发早报</p>
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="搜索文章标题、摘要、来源…" autocomplete="off" />
      <button class="search-clear" id="searchClear" title="清除">&times;</button>
    </div>
  </div>

  <!-- Main content: toggles between list view and search view -->
  <div id="listView">
    <div id="latest-section" class="latest">
      <div class="section-title">最新一期</div>
      <div class="loading">加载中…</div>
    </div>

    <div id="history-section" class="history">
      <div class="section-title">历史归档</div>
      <div class="day-list" id="history-list">
        <div class="loading">加载中…</div>
      </div>
    </div>
  </div>

  <div id="searchView" class="search-results" style="display:none;">
    <div class="search-results-count" id="searchResultsCount"></div>
    <div class="search-result-list" id="searchResultList"></div>
  </div>

  <div class="footer">
    AI-Daily for Bank · 智能研发早报存档
  </div>

</div>

<script>
(function() {
  "use strict";

  /* ===== Constants ===== */
  var MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  var WEEKDAYS = ["周日","周一","周二","周三","周四","周五","周六"];
  var CATEGORY_CLASS = {
    "国际": "intl",
    "国内": "domestic",
    "同业": "industry",
    "其他": "other"
  };

  /* ===== DOM refs ===== */
  var searchInput = document.getElementById("searchInput");
  var searchClear = document.getElementById("searchClear");
  var listView = document.getElementById("listView");
  var searchView = document.getElementById("searchView");
  var searchResultsCount = document.getElementById("searchResultsCount");
  var searchResultList = document.getElementById("searchResultList");

  /* ===== State ===== */
  var issues = [];
  var searchIndex = null;
  var debounceTimer = null;

  /* ===== Utility ===== */
  function escapeHtml(text) {
    var div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function parseDate(dateStr) {
    var parts = dateStr.split("-").map(Number);
    var dt = new Date(parts[0], parts[1] - 1, parts[2]);
    // 早报日期 = 文章日期 + 1天
    dt.setDate(dt.getDate() + 1);
    return {
      year: dt.getFullYear(),
      month: dt.getMonth() + 1,
      day: dt.getDate(),
      monthLabel: MONTHS[dt.getMonth()],
      weekday: WEEKDAYS[dt.getDay()]
    };
  }

  function highlightText(text, keyword) {
    if (!keyword) return escapeHtml(text);
    var escaped = escapeHtml(text);
    var kw = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    var re = new RegExp("(" + kw + ")", "gi");
    return escaped.replace(re, '<mark class="search-hl">$1</mark>');
  }

  function truncate(text, maxLen) {
    if (!text) return "";
    if (text.length <= maxLen) return text;
    return text.substring(0, maxLen) + "…";
  }

  function getCatClass(cat) {
    return CATEGORY_CLASS[cat] || "other";
  }

  /* ===== Render: Latest Card ===== */
  function buildTags(stats) {
    var cats = ["国际", "国内", "同业", "其他"];
    var catClasses = { "国际": "intl", "国内": "domestic", "同业": "industry", "其他": "other" };
    var tags = "";
    cats.forEach(function(cat) {
      var count = stats[cat] || 0;
      var cls = catClasses[cat];
      var emptyClass = count === 0 ? " tag-empty" : "";
      tags += '<span class="tag tag-' + cls + emptyClass + '">' + cat + ' ' + count + "条</span>";
    });
    return tags;
  }

  function renderLatest(issue) {
    var d = parseDate(issue.date);
    var s = issue.stats;
    var tags = buildTags(s);
    var summaryText = issue.summary || ("共 " + s.total + " 条内容");
    // 使用 article_date 作为文件夹路径（如果存在），否则使用 date
    var folderDate = issue.article_date || issue.date;

    return '<a class="latest-card" href="daily/' + folderDate + '/index.html">' +
      '<div class="date-col">' +
        '<div class="month">' + d.monthLabel + '</div>' +
        '<div class="day">' + d.day + '</div>' +
        '<div class="weekday">' + d.weekday + '</div>' +
      '</div>' +
      '<div class="info">' +
        '<div class="summary">' + escapeHtml(summaryText) + '</div>' +
        '<div class="tags">' + tags + '</div>' +
      '</div>' +
      '<div class="cta">' +
        '<span>查看全文 →</span>' +
      '</div>' +
    '</a>';
  }

  /* ===== Render: History Item ===== */
  function renderHistoryItem(issue) {
    var d = parseDate(issue.date);
    var s = issue.stats;
    var cats = ["国际", "国内", "同业", "其他"];
    var catColors = { "国际": "var(--intl)", "国内": "var(--domestic)", "同业": "var(--industry)", "其他": "var(--other)" };
    var statsParts = [];
    cats.forEach(function(cat) {
      var count = s[cat] || 0;
      var emptyClass = count === 0 ? " stat-empty" : "";
      statsParts.push('<span class="stat' + emptyClass + '" style="color:' + catColors[cat] + '">' + cat + ' <span class="stat-num">' + count + '</span></span>');
    });
    statsParts.push('<span class="stat total">共 ' + s.total + ' 条</span>');
    
    // 使用 article_date 作为文件夹路径（如果存在），否则使用 date
    var folderDate = issue.article_date || issue.date;

    return '<a class="day-item" href="daily/' + folderDate + '/index.html">' +
      '<div class="left">' +
        '<div class="date-block">' +
          '<div class="day-num">' + d.day + '</div>' +
          '<div class="day-month">' + d.monthLabel + '</div>' +
        '</div>' +
        '<div class="meta">' +
          '<div class="date-full">' + d.year + '-' + String(d.month).padStart(2, '0') + '-' + String(d.day).padStart(2, '0') + '<span class="weekday-label">' + d.weekday + '</span></div>' +
          '<div class="stats-row">' + statsParts.join("") + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="arrow">→</div>' +
    '</a>';
  }

  /* ===== Render: List View ===== */
  function renderListView(data) {
    issues = data.issues || [];
    if (issues.length === 0) {
      document.getElementById("latest-section").innerHTML =
        '<div class="section-title">最新一期</div><div class="loading">暂无早报</div>';
      document.getElementById("history-list").innerHTML = "";
      return;
    }

    document.getElementById("latest-section").innerHTML =
      '<div class="section-title">最新一期</div>' + renderLatest(issues[0]);

    var rest = issues.slice(1);
    if (rest.length > 0) {
      document.getElementById("history-list").innerHTML = rest.map(renderHistoryItem).join("");
    } else {
      document.getElementById("history-section").style.display = "none";
    }
  }

  /* ===== Search ===== */
  function loadSearchIndex() {
    if (searchIndex !== null) return Promise.resolve(searchIndex);
    return fetch("search-index.json").then(function(resp) {
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      return resp.json();
    }).then(function(data) {
      searchIndex = data.articles || [];
      return searchIndex;
    }).catch(function() {
      searchIndex = [];
      return searchIndex;
    });
  }

  function performSearch(keyword) {
    keyword = (keyword || "").trim();
    if (!keyword) {
      showListView();
      return;
    }

    var kw = keyword.toLowerCase();
    var results = [];
    for (var i = 0; i < searchIndex.length; i++) {
      var a = searchIndex[i];
      var titleLc = (a.title || "").toLowerCase();
      var digestLc = (a.digest || "").toLowerCase();
      var sourceLc = (a.source || "").toLowerCase();
      if (titleLc.indexOf(kw) !== -1 || digestLc.indexOf(kw) !== -1 || sourceLc.indexOf(kw) !== -1) {
        results.push(a);
      }
    }

    showSearchView(results, keyword);
  }

  function renderSearchResult(item, keyword) {
    var catCls = getCatClass(item.category);
    var d = parseDate(item.date);
    var sourceHref = "viewer.html?file=daily/" + item.date + "/sources/" + (item.source_file || "").split("/").pop();
    var dailyHref = "daily/" + item.date + "/index.html";

    var titleHtml = highlightText(item.title || "", keyword);
    var digestHtml = highlightText(truncate(item.digest, 120), keyword);
    var sourceHtml = highlightText(item.source || "", keyword);

    var originalLink = "";
    if (item.link) {
      originalLink = '<a class="search-result-original" href="' + escapeHtml(item.link) + '" target="_blank" rel="noopener noreferrer">原文 ↗</a>';
    }

    return '<div class="search-result-item">' +
      '<div class="search-result-header">' +
        '<a class="search-result-title" href="' + dailyHref + '">' + titleHtml + '</a>' +
        '<span class="search-result-date">' + d.monthLabel + d.day + '日</span>' +
      '</div>' +
      (digestHtml ? '<div class="search-result-digest">' + digestHtml + '</div>' : '') +
      '<div class="search-result-footer">' +
        '<a class="search-result-source tag-' + catCls + '" href="' + escapeHtml(sourceHref) + '">' + sourceHtml + '</a>' +
        '<span class="search-result-cat tag-' + catCls + '">' + escapeHtml(item.category || "其他") + '</span>' +
        originalLink +
      '</div>' +
    '</div>';
  }

  function showSearchView(results, keyword) {
    listView.style.display = "none";
    searchView.style.display = "block";

    if (results.length === 0) {
      searchResultsCount.textContent = "";
      searchResultList.innerHTML =
        '<div class="no-results">' +
          '<div class="icon">🔍</div>' +
          '<div class="text">未找到与「' + escapeHtml(keyword) + '」相关的内容</div>' +
        '</div>';
      return;
    }

    searchResultsCount.textContent = "找到 " + results.length + " 条结果";
    searchResultList.innerHTML = results.map(function(r) {
      return renderSearchResult(r, keyword);
    }).join("");
  }

  function showListView() {
    listView.style.display = "block";
    searchView.style.display = "none";
  }

  /* ===== Search Input Events ===== */
  searchInput.addEventListener("input", function() {
    var val = searchInput.value;
    searchClear.classList.toggle("visible", val.length > 0);

    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      if (!val.trim()) {
        showListView();
        return;
      }
      loadSearchIndex().then(function() {
        performSearch(val);
      });
    }, 200);
  });

  searchClear.addEventListener("click", function() {
    searchInput.value = "";
    searchClear.classList.remove("visible");
    showListView();
    searchInput.focus();
  });

  /* ===== Init: Load daily-index.json ===== */
  fetch("daily-index.json").then(function(resp) {
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    return resp.json();
  }).then(function(data) {
    renderListView(data);
  }).catch(function(e) {
    document.getElementById("latest-section").innerHTML =
      '<div class="section-title">最新一期</div><div class="loading">加载失败: ' + escapeHtml(e.message) + "</div>";
  });

})();
</script>
</body>
</html>
