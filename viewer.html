<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查看原文</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #f1f5f9;
  --bg-card: #ffffff;
  --bg-banner: linear-gradient(135deg, #ffffff 0%, #f0f9ff 50%, #e0f2fe 100%);
  --bg-code: #f5f7fa;
  --bg-blockquote: #f0f4f8;
  --text-primary: #1f2937;
  --text-secondary: #4b5563;
  --text-tertiary: #9ca3af;
  --text-banner: #1f2937;
  --text-banner-sub: #3b82f6;
  --border-card: #e2e8f0;
  --border-code: #e2e8f0;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.25s ease;
  --link-color: #3b82f6;
  --accent-purple: #8b5cf6;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1219;
    --bg-card: #1a1f2e;
    --bg-banner: linear-gradient(135deg, #070d1a 0%, #0e1e3d 50%, #091428 100%);
    --bg-code: #252d3d;
    --bg-blockquote: #1e2433;
    --text-primary: #e2e8f0;
    --text-secondary: #a0aec0;
    --text-tertiary: #718096;
    --text-banner: #ffffff;
    --text-banner-sub: #7da8d4;
    --border-card: #2d3748;
    --border-code: #2d3748;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.3);
    --link-color: #60a5fa;
    --accent-purple: #c084fc;
  }
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.7;
  min-height: 100vh;
}

/* ===== Layout ===== */
.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 16px;
}
@media (min-width: 768px) { .container { padding: 24px; } }
@media (min-width: 1024px) { .container { padding: 32px 40px; } }

/* ===== Banner ===== */
.banner {
  background: var(--bg-banner);
  border-radius: var(--radius);
  padding: 24px 20px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.banner::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 60%;
  height: 200%;
  background: radial-gradient(ellipse, rgba(59,130,246,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(59,130,246,0.08);
  backdrop-filter: blur(4px);
  color: #3b82f6;
  font-size: 13px;
  text-decoration: none;
  border: 1px solid rgba(59,130,246,0.15);
  margin-bottom: 14px;
  cursor: pointer;
  transition: all var(--transition);
  min-height: 36px;
}
.back-btn:hover {
  background: rgba(59,130,246,0.15);
  color: #2563eb;
}
.banner-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-banner);
  line-height: 1.4;
  word-break: break-word;
  position: relative;
}
.banner-meta {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  position: relative;
}
.source-name {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  background: rgba(139,92,246,0.12);
  color: #7e22ce;
}
.publish-time {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  background: rgba(59,130,246,0.12);
  color: #2563eb;
}
.original-link-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  background: rgba(59,130,246,0.12);
  color: #2563eb;
  text-decoration: none;
  transition: all var(--transition);
}
.original-link-btn:hover {
  background: rgba(59,130,246,0.2);
  color: #1d4ed8;
}

@media (prefers-color-scheme: dark) {
  .back-btn {
    background: rgba(255,255,255,0.1);
    color: #7da8d4;
    border-color: rgba(255,255,255,0.08);
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.18);
    color: #ffffff;
  }
  .source-name {
    background: rgba(168,85,247,0.25);
    color: #e9d5ff;
  }
  .publish-time {
    background: rgba(59,130,246,0.25);
    color: #bfdbfe;
  }
  .original-link-btn {
    background: rgba(59,130,246,0.25);
    color: #bfdbfe;
  }
  .original-link-btn:hover {
    background: rgba(59,130,246,0.4);
    color: #fff;
  }
}

@media (min-width: 768px) {
  .banner { padding: 32px 28px; }
  .banner-title { font-size: 24px; }
}

/* ===== Content Card ===== */
.content-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-card);
  padding: 24px 20px;
  overflow: hidden;
}
@media (min-width: 768px) {
  .content-card { padding: 36px 40px; }
}

/* ===== Markdown Styles ===== */
.markdown-body {
  font-size: 15px;
  color: var(--text-primary);
  line-height: 1.85;
  word-break: break-word;
}
.markdown-body h1,
.markdown-body h2,
.markdown-body h3,
.markdown-body h4,
.markdown-body h5,
.markdown-body h6 {
  color: var(--text-primary);
  font-weight: 600;
  margin: 28px 0 14px;
  line-height: 1.4;
}
.markdown-body h1 { font-size: 22px; margin-top: 0; }
.markdown-body h2 { font-size: 19px; }
.markdown-body h3 { font-size: 17px; }
.markdown-body h4 { font-size: 15px; }
.markdown-body p {
  margin: 14px 0;
}
.markdown-body ul,
.markdown-body ol {
  margin: 14px 0;
  padding-left: 24px;
}
.markdown-body li {
  margin: 6px 0;
}
.markdown-body blockquote {
  border-left: 3px solid var(--accent-purple);
  padding: 8px 16px;
  margin: 16px 0;
  background: var(--bg-blockquote);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--text-secondary);
}
.markdown-body blockquote p {
  margin: 4px 0;
}
.markdown-body code {
  background: var(--bg-code);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: "SF Mono", Monaco, "Cascadia Code", "JetBrains Mono", monospace;
  color: var(--accent-purple);
  border: 1px solid var(--border-code);
}
.markdown-body pre {
  background: var(--bg-code);
  padding: 16px;
  border-radius: var(--radius-sm);
  overflow-x: auto;
  margin: 16px 0;
  border: 1px solid var(--border-code);
}
.markdown-body pre code {
  background: none;
  padding: 0;
  border: none;
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.7;
}
.markdown-body img {
  max-width: 100%;
  height: auto;
  border-radius: var(--radius-sm);
  display: block;
  margin: 16px auto;
}
.markdown-body a {
  color: var(--link-color);
  text-decoration: none;
}
.markdown-body a:hover {
  text-decoration: underline;
}
.markdown-body hr {
  border: none;
  border-top: 1px solid var(--border-card);
  margin: 24px 0;
}
.markdown-body table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 14px;
}
.markdown-body th,
.markdown-body td {
  border: 1px solid var(--border-card);
  padding: 8px 12px;
  text-align: left;
}
.markdown-body th {
  background: var(--bg-code);
  font-weight: 600;
}
.markdown-body strong {
  font-weight: 600;
  color: var(--text-primary);
}

/* ===== Error State ===== */
.error-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-tertiary);
}
.error-state .error-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.6;
}
.error-state .error-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.error-state .error-detail {
  font-size: 14px;
  margin-bottom: 20px;
}

/* ===== Loading ===== */
.loading-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-tertiary);
  font-size: 14px;
}
.loading-state .spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border-card);
  border-top-color: var(--link-color);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== Animations ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.content-card {
  animation: fadeIn 0.3s ease forwards;
}
</style>
</head>
<body>

<div class="container">
  <!-- Banner -->
  <div class="banner">
    <a class="back-btn" id="back-btn" href="#">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      返回早报
    </a>
    <div class="banner-title" id="article-title">加载中…</div>
    <div class="banner-meta" id="article-meta" style="display:none">
      <span class="source-name" id="source-name"></span>
      <span class="publish-time" id="publish-time" style="display:none"></span>
    </div>
  </div>

  <!-- Content -->
  <div id="content-area">
    <div class="loading-state">
      <div class="spinner"></div>
      正在加载文章内容…
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  /* ===== Parse URL param ===== */
  var params = new URLSearchParams(window.location.search);
  var filePath = params.get('file');

  var contentArea = document.getElementById('content-area');
  var titleEl = document.getElementById('article-title');
  var metaEl = document.getElementById('article-meta');
  var sourceNameEl = document.getElementById('source-name');

  if (!filePath) {
    showError('缺少文件参数', '请在 URL 中通过 ?file= 指定 Markdown 文件路径。');
    return;
  }

  /* Set up back button: try history.back() first, fallback to computed link */
  var backBtn = document.getElementById('back-btn');
  var backUrl = './index.html';
  var m = filePath.match(/^(daily\/[\d]{4}-[\d]{2}-[\d]{2})\/sources\//);
  if (m) backUrl = './' + m[1] + '/index.html';
  backBtn.href = backUrl;
  backBtn.addEventListener('click', function(e) {
    if (history.length > 1) {
      e.preventDefault();
      history.back();
    }
  });

  /* ===== Fetch markdown ===== */
  // Encode the filePath to ensure proper URL resolution for Chinese filenames
  var fetchUrl = filePath.split('/').map(encodeURIComponent).join('/');
  fetch(fetchUrl)
    .then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status + '：无法加载文件');
      return resp.text();
    })
    .then(function(md) {
      renderContent(md);
    })
    .catch(function(err) {
      showError('加载失败', '文件: ' + filePath + '\n错误: ' + (err.message || '无法读取文件内容'));
    });

  /* ===== Render Content ===== */
  function renderContent(md) {
    var lines = md.split('\n');
    var title = '';
    var sourceName = '';
    var originalUrl = '';
    var publishTime = '';  // 发布时间
    var bodyLines = [];
    var inFrontMatter = false;
    var frontMatterDone = false;

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var trimmed = line.trim();

      /* Extract title from first h1 */
      if (!title && trimmed.startsWith('# ')) {
        title = trimmed.substring(2).trim();
        continue;
      }

      /* Detect front matter block (before first h1 or early in doc) */
      if (!frontMatterDone && trimmed === '---') {
        inFrontMatter = !inFrontMatter;
        if (!inFrontMatter) frontMatterDone = true;
        continue;
      }

      /* Extract metadata from front matter */
      if (inFrontMatter) {
        // 提取 publish_time
        var timeMatch = trimmed.match(/^publish_time:\s*(\d+)/);
        if (timeMatch) {
          var timestamp = parseInt(timeMatch[1]);
          var dt = new Date(timestamp * 1000);
          // 格式化为 yyyy-mm-dd hh:mm
          var year = dt.getFullYear();
          var month = String(dt.getMonth() + 1).padStart(2, '0');
          var day = String(dt.getDate()).padStart(2, '0');
          var hours = String(dt.getHours()).padStart(2, '0');
          var minutes = String(dt.getMinutes()).padStart(2, '0');
          publishTime = year + '-' + month + '-' + day + ' ' + hours + ':' + minutes;
        }
        continue;
      }

      /* Extract source info from blockquote lines */
      if (!frontMatterDone && trimmed.startsWith('>')) {
        var content = trimmed.substring(1).trim();
        if (content.indexOf('公众号') !== -1) {
          var m = content.match(/公众号[：:]\s*(.+)/);
          if (m) sourceName = m[1].trim();
        }
        if (content.indexOf('原文链接') !== -1) {
          var m2 = content.match(/https?:\/\/[^\s]+/);
          if (m2) originalUrl = m2[0];
        }
        continue;
      }

      /* Skip the "阅读原文" link div often inserted by scraper */
      if (trimmed.indexOf('original-link') !== -1 ||
          (trimmed.startsWith('<a href=') && trimmed.indexOf('阅读原文') !== -1)) {
        continue;
      }

      bodyLines.push(line);
    }

    /* Use filename as fallback title */
    if (!title) {
      var parts = filePath.split('/');
      var fname = parts[parts.length - 1] || '查看原文';
      title = fname.replace(/\.md$/i, '').replace(/^[\d_-]+/, '').replace(/_/g, ' ');
    }

    /* Update banner */
    titleEl.textContent = title;
    if (sourceName) {
      sourceNameEl.textContent = sourceName;
      metaEl.style.display = 'flex';
    }
    if (publishTime) {
      var publishTimeEl = document.getElementById('publish-time');
      publishTimeEl.textContent = publishTime;
      publishTimeEl.style.display = 'inline-flex';
      metaEl.style.display = 'flex';
    }

    /* Render markdown body */
    var bodyMd = bodyLines.join('\n').trim();
    if (!bodyMd) {
      bodyMd = md; /* fallback: render everything if extraction removed too much */
    }

    var html = '';
    try {
      html = marked.parse(bodyMd);
    } catch (e) {
      html = '<p style="color:var(--text-tertiary)">渲染失败，以下为纯文本内容：</p><pre style="white-space:pre-wrap">' + escapeHtml(bodyMd) + '</pre>';
    }

    contentArea.innerHTML = '<div class="content-card"><div class="markdown-body">' + html + '</div></div>';

    /* Set page title */
    document.title = title + ' · 查看原文';
  }

  /* ===== Error ===== */
  function showError(title, detail) {
    titleEl.textContent = '加载失败';
    contentArea.innerHTML =
      '<div class="content-card">' +
        '<div class="error-state">' +
          '<div class="error-icon">📄</div>' +
          '<div class="error-title">' + escapeHtml(title) + '</div>' +
          '<div class="error-detail">' + escapeHtml(detail) + '</div>' +
          '<a class="back-btn" href="javascript:history.back()" style="background:var(--bg-code);color:var(--text-secondary);border-color:var(--border-card)">' +
            '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
            '返回早报' +
          '</a>' +
        '</div>' +
      '</div>';
  }

  /* ===== Utility ===== */
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
})();
</script>

</body>
</html>
